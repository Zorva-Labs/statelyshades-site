<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Your Contract · Stately Shades</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css?v=blog10"/>
  <style>
    .doc { max-width: 820px; margin: 0 auto; padding: clamp(60px, 10vw, 120px) clamp(20px, 4vw, 40px) 80px; }
    .doc-mast { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 28px; border-bottom: 1px solid var(--color-line); margin-bottom: 36px; }
    .doc-brand { font-family: var(--font-display); font-size: 1.5rem; }
    .doc-brand small { display: block; font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.28em; color: var(--color-brass); text-transform: uppercase; margin-top: 4px; }
    .doc h1 { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 400; letter-spacing: -0.02em; margin: 0 0 16px; }
    .doc h1 em { color: var(--color-brass); }
    .doc-intro { font-family: var(--font-display); font-style: italic; font-size: 1.1rem; line-height: 1.55; color: var(--color-ink-soft); margin-bottom: 30px; }
    .doc-meta { display: flex; gap: 24px; flex-wrap: wrap; font-size: 0.88rem; color: var(--color-ink-soft); margin-bottom: 32px; padding: 18px 22px; background: var(--color-bg-2); border-radius: 2px; }
    .doc-meta strong { color: var(--color-ink); display: block; font-weight: 600; }
    .doc h2 { font-family: var(--font-display); font-weight: 500; font-size: 1.4rem; color: var(--color-ink); margin: 36px 0 14px; }
    .doc h3 { font-family: var(--font-display); font-weight: 500; font-size: 1.1rem; color: var(--color-ink); margin: 22px 0 8px; }
    .doc p { font-size: 0.98rem; line-height: 1.7; color: var(--color-ink-2); }
    .doc table { width: 100%; border-collapse: collapse; margin: 14px 0; }
    .doc table thead th { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-ink-soft); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--color-line); font-weight: 600; }
    .doc table tbody td { padding: 14px 12px; border-bottom: 1px solid var(--color-line-soft); font-size: 0.92rem; vertical-align: top; }
    .doc table tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .doc-totals { margin-left: auto; max-width: 340px; padding-top: 18px; font-variant-numeric: tabular-nums; }
    .doc-totals .r { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.98rem; }
    .doc-totals .r.grand { border-top: 1px solid var(--color-line); margin-top: 8px; padding-top: 14px; font-size: 1.2rem; font-weight: 600; color: var(--color-ink); }
    .doc-totals .r.deposit { color: var(--color-brass); font-weight: 600; padding-top: 12px; }
    .sign-box { background: #fff; border: 2px solid var(--color-ink); padding: 32px; margin-top: 40px; }
    .sign-box h2 { margin-top: 0; }
    .sign-box label { display: block; margin-bottom: 16px; }
    .sign-box label span { display: block; font-size: 0.78rem; color: var(--color-ink-soft); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.12em; }
    .sign-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--color-line); font: inherit; font-size: 0.95rem; }
    .sig { background: #fff; border: 1px solid var(--color-line); }
    .sig canvas { display: block; width: 100%; height: 180px; cursor: crosshair; touch-action: none; background: linear-gradient(transparent calc(100% - 1px), var(--color-line) calc(100% - 1px)); }
    .sig-bar { padding: 10px 14px; border-top: 1px solid var(--color-line-soft); display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--color-ink-soft); }
    .sig-bar button { background: transparent; border: 0; color: var(--color-ink-soft); font: inherit; cursor: pointer; }
    .sign-btn { width: 100%; padding: 18px; background: var(--color-ink); color: var(--color-bg); border: 0; font: inherit; font-family: var(--font-mono); font-size: 0.84rem; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; font-weight: 600; margin-top: 14px; }
    .sign-btn:hover { background: var(--color-espresso-2); }
    .sign-btn:disabled { opacity: 0.5; }
    .signed-box { background: var(--color-espresso); color: var(--color-bg); padding: 40px; text-align: center; margin-top: 40px; }
    .signed-box h2 { color: var(--color-bg); font-family: var(--font-display); font-size: 2rem; font-weight: 400; margin: 0 0 12px; }
    .signed-box p { color: rgba(247,242,234,.82); font-family: var(--font-display); font-style: italic; margin: 0; }
    @media print { body { background: #fff; } .sign-btn, .sign-bar button { display: none; } }
  </style>
</head>
<body>
<main class="doc" id="root"><p style="text-align:center;color:var(--color-ink-soft);padding:40px">Loading…</p></main>
<script>
const token = new URLSearchParams(location.search).get("t");
if (!token) document.getElementById("root").innerHTML = `<p style="color:#B85450;text-align:center">Missing token.</p>`;
else load();

let contract = null;
async function load() {
  try {
    const data = await (await fetch("/api/public/contract/" + token)).json();
    if (data.error) throw new Error(data.error);
    contract = data.contract;
    render(data.contract, data.lines);
  } catch (e) { document.getElementById("root").innerHTML = `<p style="color:#B85450;text-align:center;padding:40px">${esc(e.message)}</p>`; }
}

function render(k, lines) {
  const isSigned = ["signed_by_customer", "fully_executed"].includes(k.status);
  const isExecuted = k.status === "fully_executed";
  document.title = `${k.number} · Your Contract · Stately Shades`;

  document.getElementById("root").innerHTML = `
    <div class="doc-mast">
      <div class="doc-brand">Stately Shades<small>Service Agreement</small></div>
      <div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--color-ink-soft)">${esc(k.number)}</div>
    </div>
    <h1>Window-treatment <em>agreement.</em></h1>
    <p class="doc-intro">${esc(k.intro || "")}</p>

    <div class="doc-meta">
      <div><strong>Customer</strong>${esc(k.contact_name)}</div>
      <div><strong>Project</strong>${esc(k.project_name)}</div>
      ${k.site_address ? `<div><strong>Site</strong>${esc(k.site_address)}</div>` : ""}
      <div><strong>Install window</strong>${esc(k.estimated_install_window || "TBD")}</div>
    </div>

    <h2>Scope of work</h2>
    ${k.scope_html ? `<div>${k.scope_html}</div>` : ""}
    <table>
      <thead><tr><th style="width:55%">Item</th><th>Room</th><th class="num">Qty</th><th class="num">Unit</th><th class="num">Total</th></tr></thead>
      <tbody>${lines.map((l) => `<tr><td><strong>${esc(l.description)}</strong></td><td>${esc(l.room || "")}</td><td class="num">${l.quantity}</td><td class="num">${money(l.unit_price_cents)}</td><td class="num"><strong>${money(l.line_total_cents)}</strong></td></tr>`).join("")}</tbody>
    </table>
    <div class="doc-totals">
      <div class="r grand"><span>Total</span><span>${money(k.total_cents)}</span></div>
      <div class="r deposit"><span>Deposit due at signing</span><span>${money(k.deposit_cents)}</span></div>
    </div>

    <h2>Terms &amp; conditions</h2>
    <div>${k.terms_html || ""}</div>

    ${isExecuted ? `
      <div class="signed-box">
        <h2>Job is booked.</h2>
        <p>Signed by you on ${formatDt(k.signed_by_customer_at)}, counter-signed by Stately Shades on ${formatDt(k.counter_signed_at)}.</p>
      </div>
    ` : isSigned ? `
      <div class="signed-box" style="background:var(--color-brass);color:var(--color-ink)">
        <h2 style="color:var(--color-ink)">Thank you — signed!</h2>
        <p style="color:var(--color-ink);opacity:0.8">We've received your signature. We'll counter-sign and release your order shortly.</p>
      </div>
    ` : `
      <div class="sign-box">
        <h2>Sign to book the job</h2>
        <p style="font-size:0.92rem;color:var(--color-ink-soft);margin:0 0 22px">By typing your name and signing below, you accept the terms above and authorize Stately Shades to release your order to manufacturing.</p>
        <label><span>Full legal name</span><input id="signer-name" autocomplete="name"/></label>
        <label><span>Email (for receipt)</span><input id="signer-email" type="email" autocomplete="email" value="${esc(k.contact_email)}"/></label>
        <label><span>Draw your signature</span>
          <div class="sig">
            <canvas id="sig-pad" width="700" height="180"></canvas>
            <div class="sig-bar"><span>Use mouse, finger, or stylus</span><button type="button" id="sig-clear">Clear</button></div>
          </div>
        </label>
        <button class="sign-btn" id="sign-btn" onclick="sign()">Sign &amp; book the job</button>
      </div>
    `}
  `;

  if (!isSigned) wirePad();
}

let pad = null;
function wirePad() {
  const canvas = document.getElementById("sig-pad");
  const ctx = canvas.getContext("2d");
  ctx.strokeStyle = "#14110D"; ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.lineJoin = "round";
  let drawing = false, hasStroke = false;
  const pos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    const x = (e.touches?.[0]?.clientX ?? e.clientX) - rect.left;
    const y = (e.touches?.[0]?.clientY ?? e.clientY) - rect.top;
    return [x * sx, y * sy];
  };
  const start = (e) => { e.preventDefault(); drawing = true; hasStroke = true; const [x, y] = pos(e); ctx.beginPath(); ctx.moveTo(x, y); };
  const move = (e) => { if (!drawing) return; e.preventDefault(); const [x, y] = pos(e); ctx.lineTo(x, y); ctx.stroke(); };
  const end = () => { drawing = false; };
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start); canvas.addEventListener("touchmove", move); canvas.addEventListener("touchend", end);
  pad = { clear: () => { ctx.clearRect(0, 0, canvas.width, canvas.height); hasStroke = false; }, isEmpty: () => !hasStroke, toDataURL: () => canvas.toDataURL("image/png") };
  document.getElementById("sig-clear").onclick = () => pad.clear();
}

async function sign() {
  const name = document.getElementById("signer-name").value.trim();
  const email = document.getElementById("signer-email").value.trim();
  if (!name) { alert("Please type your full legal name."); return; }
  if (!pad || pad.isEmpty()) { alert("Please draw your signature."); return; }
  const btn = document.getElementById("sign-btn");
  btn.disabled = true; btn.textContent = "Signing…";
  try {
    const res = await fetch("/api/public/contract/" + token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "sign", signer_name: name, signer_email: email, signature_image: pad.toDataURL() }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Couldn't sign.");
    load();
  } catch (e) { alert(e.message); btn.disabled = false; btn.textContent = "Sign & book the job"; }
}

function money(c) { if (c == null) return "—"; return "$" + (c / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function formatDt(iso) { if (!iso) return ""; const d = new Date(iso.replace(" ", "T")); return d.toLocaleString(undefined, { dateStyle: "long", timeStyle: "short" }); }
</script>
</body>
</html>
