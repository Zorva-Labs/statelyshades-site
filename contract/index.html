<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Contract · Stately Shades</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=blog9" />
  <style>
    .ct-wrap { max-width: 880px; margin: 0 auto; padding: clamp(120px, 16vw, 200px) var(--gutter) clamp(80px, 12vw, 120px); }
    .ct-head { text-align: center; margin-bottom: 40px; }
    .ct-head h1 { font-size: clamp(2.4rem, 5vw, 3.6rem); font-family: var(--font-display); font-weight: 400; margin: 18px 0 0; }
    .ct-head h1 em { color: var(--color-brass); }
    .ct-card { background: #fff; border: 1px solid var(--color-line-soft); padding: clamp(28px, 4vw, 44px); margin-bottom: 22px; }
    .ct-card h2 { font-family: var(--font-display); font-weight: 400; font-size: 1.6rem; margin: 0 0 18px; }
    .ct-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; }
    .ct-info span { display: block; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-ink-soft); margin-bottom: 4px; }
    .ct-info strong { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; color: var(--color-ink); }
    .ct-lines { width: 100%; border-collapse: collapse; }
    .ct-lines th, .ct-lines td { padding: 14px 8px; border-bottom: 1px solid var(--color-line-soft); text-align: left; font-size: 0.96rem; vertical-align: top; }
    .ct-lines th { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-brass); font-weight: 500; }
    .ct-lines td.num, .ct-lines th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .ct-lines tfoot td { font-weight: 600; font-family: var(--font-display); font-size: 1.05rem; border-bottom: 0; }
    .ct-lines tfoot td.grand { font-size: 1.5rem; padding-top: 16px; border-top: 2px solid var(--color-ink); }
    .ct-terms { font-size: 0.95rem; line-height: 1.65; color: var(--color-ink-2); }
    .ct-terms h3 { font-family: var(--font-display); font-weight: 500; font-size: 1.15rem; margin: 22px 0 8px; }
    .ct-sign-area { background: var(--color-bg-2); border: 1px solid var(--color-line); padding: clamp(28px, 4vw, 40px); margin-top: 24px; }
    .ct-sign-area h2 { margin-bottom: 10px; }
    .ct-sign-area p { color: var(--color-ink-soft); font-size: 0.95rem; margin-bottom: 16px; line-height: 1.55; }
    .ct-sign-form { display: grid; gap: 14px; max-width: 540px; }
    .ct-sign-form label > span { display: block; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-ink-soft); margin-bottom: 6px; }
    .ct-sign-form input { padding: 12px 14px; border: 1px solid var(--color-line); background: #fff; font: inherit; font-size: 1rem; }
    .ct-pad-wrap { background: #fff; border: 1px solid var(--color-line); margin-top: 6px; }
    .ct-pad-wrap canvas { display: block; width: 100%; height: 180px; cursor: crosshair; touch-action: none; }
    .ct-pad-controls { padding: 8px 12px; border-top: 1px solid var(--color-line-soft); display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--color-ink-soft); }
    .ct-pad-controls button { background: transparent; border: 0; color: var(--color-ink-soft); font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; }
    .ct-pad-controls button:hover { color: var(--color-brass); }
    .ct-signed { text-align: center; padding: 30px 20px; background: rgba(61,107,61,.08); border: 1px solid rgba(61,107,61,.3); }
    .ct-signed h3 { font-family: var(--font-display); font-weight: 400; font-size: 1.6rem; color: #3d6b3d; margin: 0 0 8px; }
    .ct-signed img { max-height: 100px; margin: 12px auto; display: block; }
    @media print { .nav, .ct-sign-area form, .mobile-cta { display: none !important; } body { background:#fff; } }
  </style>
</head>
<body>

  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a class="nav__brand" href="/" aria-label="Stately Shades home">
        <span class="nav__monogram" aria-hidden="true">S<span>S</span></span>
        <span class="nav__lockup">
          <span class="nav__wordmark">STATELY SHADES</span>
          <span class="nav__rule" aria-hidden="true"></span>
          <span class="nav__tagline">Blinds, Shutters &amp; Shades</span>
        </span>
      </a>
    </div>
  </header>

  <main class="ct-wrap" id="root">
    <p style="text-align:center;color:var(--color-ink-soft);font-style:italic">Loading your contract…</p>
  </main>

  <script>
  let state = {};
  let pad = null;

  (async () => {
    const token = new URLSearchParams(location.search).get("t");
    if (!token) { document.getElementById("root").innerHTML = `<p style="text-align:center;color:#B85450">Missing access link.</p>`; return; }
    try {
      const res = await fetch("/api/public/contract/" + encodeURIComponent(token));
      state = await res.json();
      if (!res.ok) throw new Error(state.error || "Not found");
      state.token = token;
      render();
    } catch (e) {
      document.getElementById("root").innerHTML = `<p style="text-align:center;color:#B85450">${esc(e.message)}</p>`;
    }
  })();

  function render() {
    const k = state.contract;
    const isSigned = ["signed_by_customer", "fully_executed"].includes(k.status);
    document.getElementById("root").innerHTML = `
      <div class="ct-head">
        <span class="eyebrow">Service Agreement</span>
        <h1>${esc(k.project_name)}</h1>
        <div style="margin-top:14px;font-family:var(--font-mono);font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--color-ink-soft)">${esc(k.number)} · ${esc(k.status.replace(/_/g, ' '))}</div>
      </div>

      <div class="ct-card">
        <div class="ct-info">
          <div><span>Customer</span><strong>${esc(k.contact_name)}</strong></div>
          ${k.site_address ? `<div><span>Site address</span><strong>${esc(k.site_address)}</strong></div>` : ""}
          <div><span>Install window</span><strong>${esc(k.estimated_install_window || "TBD")}</strong></div>
        </div>
      </div>

      ${k.intro ? `<div class="ct-card"><h2>About this agreement</h2><p style="line-height:1.65;color:var(--color-ink-2);font-size:1rem">${esc(k.intro)}</p></div>` : ""}

      <div class="ct-card">
        <h2>Scope &amp; line items</h2>
        ${k.scope_html ? `<div class="ct-terms" style="margin-bottom:18px">${k.scope_html}</div>` : ""}
        <table class="ct-lines">
          <thead><tr><th>Room</th><th>Item</th><th class="num">Qty</th><th class="num">Unit</th><th class="num">Total</th></tr></thead>
          <tbody>${state.lines.map((l) => `<tr><td>${esc(l.room || "")}</td><td>${esc(l.description)}</td><td class="num">${l.quantity}</td><td class="num">${fmtMoney(l.unit_price_cents)}</td><td class="num">${fmtMoney(l.line_total_cents)}</td></tr>`).join("")}</tbody>
          <tfoot>
            <tr><td colspan="4" class="num">Total</td><td class="num grand">${fmtMoney(k.total_cents)}</td></tr>
            <tr><td colspan="4" class="num">Deposit due at signing</td><td class="num">${fmtMoney(k.deposit_cents)}</td></tr>
            <tr><td colspan="4" class="num">Balance at install</td><td class="num">${fmtMoney(k.total_cents - k.deposit_cents)}</td></tr>
          </tfoot>
        </table>
      </div>

      <div class="ct-card">
        <h2>Terms &amp; conditions</h2>
        <div class="ct-terms">${k.terms_html || ""}</div>
      </div>

      ${isSigned ? renderSigned(k) : renderSignArea(k)}
    `;
    if (!isSigned) initPad();
  }

  function renderSignArea(k) {
    return `<div class="ct-sign-area">
      <h2>Sign &amp; accept</h2>
      <p>By typing your full legal name below and signing, you agree to the scope, terms, and pricing above. The deposit (${fmtMoney(k.deposit_cents)}) becomes due upon signing — we'll coordinate payment after you sign.</p>
      <form class="ct-sign-form" onsubmit="event.preventDefault();sign()">
        <label><span>Full legal name</span><input id="signer-name" type="text" required autocomplete="name"/></label>
        <label><span>Email (for the executed copy)</span><input id="signer-email" type="email" autocomplete="email" value="${esc(k.contact_email || '')}"/></label>
        <div>
          <span style="display:block;font-family:var(--font-mono);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--color-ink-soft);margin-bottom:6px">Sign here</span>
          <div class="ct-pad-wrap"><canvas id="pad"></canvas></div>
          <div class="ct-pad-controls"><span>Sign with mouse or finger</span><button type="button" onclick="clearPad()">Clear</button></div>
        </div>
        <div style="margin-top:8px">
          <button type="submit" class="btn">Sign &amp; Submit</button>
          <button type="button" class="btn btn--ghost" onclick="window.print()">Print first</button>
        </div>
      </form>
    </div>`;
  }

  function renderSigned(k) {
    if (k.status === "fully_executed") {
      return `<div class="ct-signed">
        <h3>Fully executed ✓</h3>
        <p>Signed by <strong>${esc(k.signer_name)}</strong>${k.signed_by_customer_at ? ` on ${esc(k.signed_by_customer_at.slice(0, 10))}` : ""} · Counter-signed by Stately Shades${k.counter_signed_at ? ` on ${esc(k.counter_signed_at.slice(0, 10))}` : ""}.</p>
        ${k.signature_image ? `<img src="${k.signature_image}" alt="Your signature" />` : ""}
        <button class="btn btn--ghost" onclick="window.print()">Print / Save PDF</button>
      </div>`;
    }
    return `<div class="ct-signed" style="background:#f7f0e4;border-color:rgba(157,122,62,.3);color:var(--color-brass)">
      <h3 style="color:var(--color-brass)">Signed ✓</h3>
      <p>Thank you, <strong>${esc(k.signer_name)}</strong>. Your signature is on file (${k.signed_by_customer_at ? esc(k.signed_by_customer_at.slice(0, 16).replace('T', ' at ')) : ""}). We'll counter-sign and email you the fully-executed copy within one business day.</p>
      ${k.signature_image ? `<img src="${k.signature_image}" alt="Your signature" />` : ""}
      <button class="btn btn--ghost" onclick="window.print()">Print / Save PDF</button>
    </div>`;
  }

  function initPad() {
    const canvas = document.getElementById("pad");
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    const ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr); ctx.lineWidth = 2.4; ctx.lineCap = "round"; ctx.strokeStyle = "#14110D";
    let drawing = false; let last = null; let dirty = false;
    const pos = (e) => { const r = canvas.getBoundingClientRect(); const t = e.touches?.[0]; return { x: (t?.clientX ?? e.clientX) - r.left, y: (t?.clientY ?? e.clientY) - r.top }; };
    const down = (e) => { e.preventDefault(); drawing = true; last = pos(e); };
    const move = (e) => { if (!drawing) return; e.preventDefault(); const p = pos(e); ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke(); last = p; dirty = true; };
    const up = () => { drawing = false; };
    canvas.addEventListener("mousedown", down); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    canvas.addEventListener("touchstart", down, { passive: false }); canvas.addEventListener("touchmove", move, { passive: false }); window.addEventListener("touchend", up);
    pad = { canvas, ctx, image: () => canvas.toDataURL("image/png"), isDirty: () => dirty, clear: () => { ctx.clearRect(0, 0, canvas.width, canvas.height); dirty = false; } };
  }
  function clearPad() { pad?.clear(); }

  async function sign() {
    const name = document.getElementById("signer-name").value.trim();
    const email = document.getElementById("signer-email").value.trim();
    if (!name) { alert("Please type your full legal name."); return; }
    if (!pad?.isDirty()) { alert("Please sign with your mouse or finger above."); return; }
    const btn = document.querySelector(".ct-sign-form button[type='submit']");
    btn.disabled = true; btn.innerHTML = "Submitting…";
    try {
      const r = await fetch("/api/public/contract/" + state.token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({
        action: "sign", signer_name: name, signer_email: email, signature_image: pad.image(),
      })});
      const out = await r.json();
      if (!r.ok || out.error) throw new Error(out.error || "Couldn't submit signature");
      location.reload();
    } catch (e) {
      alert(e.message);
      btn.disabled = false; btn.innerHTML = "Sign &amp; Submit";
    }
  }

  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function fmtMoney(c) { return "$" + (c / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  </script>
</body>
</html>
