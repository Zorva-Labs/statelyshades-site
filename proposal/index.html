<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Proposal · Stately Shades</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=blog9" />
  <style>
    .prop-wrap { max-width: 1100px; margin: 0 auto; padding: clamp(120px, 16vw, 200px) var(--gutter) clamp(80px, 12vw, 120px); }
    .prop-head { text-align: center; margin-bottom: clamp(40px, 6vw, 70px); }
    .prop-head h1 { font-size: clamp(2.4rem, 5vw, 3.8rem); font-family: var(--font-display); font-weight: 400; margin: 18px 0 0; }
    .prop-head h1 em { color: var(--color-brass); }
    .prop-intro { background: #fff; border: 1px solid var(--color-line-soft); padding: clamp(28px, 4vw, 44px); margin-bottom: 22px; font-family: var(--font-display); font-style: italic; font-size: 1.15rem; line-height: 1.6; color: var(--color-ink-soft); }
    .prop-tiers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    @media (max-width: 900px) { .prop-tiers { grid-template-columns: 1fr; } }
    .prop-tier { background: #fff; border: 1px solid var(--color-line); padding: 32px 28px; display: flex; flex-direction: column; }
    .prop-tier__label { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-brass); }
    .prop-tier__title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 400; margin: 6px 0 14px; line-height: 1.1; }
    .prop-tier__total { font-family: var(--font-display); font-size: 2.4rem; font-weight: 500; color: var(--color-ink); margin-bottom: 18px; }
    .prop-tier__total small { display: block; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.22em; color: var(--color-ink-soft); text-transform: uppercase; font-weight: 400; margin-top: 4px; }
    .prop-tier__lines { font-size: 0.92rem; color: var(--color-ink-soft); flex: 1; line-height: 1.55; margin: 0; padding: 0; list-style: none; }
    .prop-tier__lines li { padding: 8px 0; border-bottom: 1px solid var(--color-line-soft); }
    .prop-tier__lines li:last-child { border-bottom: 0; }
    .prop-tier__lines li strong { color: var(--color-ink); font-weight: 500; display: block; }
    .prop-tier__lines li .money { float: right; color: var(--color-ink); font-variant-numeric: tabular-nums; }
    .prop-tier__select { margin-top: 22px; }
    .prop-tier.is-selected { border-color: var(--color-brass); border-width: 2px; padding: 31px 27px; box-shadow: 0 12px 36px -12px rgba(157,122,62,.3); }
    .prop-tier.is-selected .prop-tier__title { color: var(--color-brass); }
    .prop-accept { background: var(--color-espresso); color: var(--color-bg); padding: clamp(40px, 6vw, 60px); text-align: center; margin-top: 30px; }
    .prop-accept h2 { color: var(--color-bg); font-family: var(--font-display); font-size: clamp(1.8rem, 3.4vw, 2.6rem); font-weight: 400; margin: 0 0 14px; }
    .prop-accept h2 em { color: var(--color-champagne); }
    .prop-accept p { color: rgba(247,242,234,.82); max-width: 50ch; margin: 0 auto 22px; font-family: var(--font-display); font-style: italic; font-size: 1.08rem; }
    .prop-accept input { padding: 12px 14px; border: 1px solid var(--color-champagne); background: rgba(247,242,234,.05); color: var(--color-bg); font: inherit; font-size: 1rem; min-width: 280px; max-width: 100%; text-align: center; margin-right: 10px; }
    .prop-accept .btn { background: var(--color-champagne); color: var(--color-espresso); border-color: var(--color-champagne); }
    .prop-comments { background: #fff; border: 1px solid var(--color-line-soft); padding: clamp(24px, 4vw, 36px); margin-top: 30px; }
    .prop-comments h2 { font-family: var(--font-display); font-weight: 400; font-size: 1.4rem; margin: 0 0 16px; }
    .prop-comment { padding: 10px 0; border-bottom: 1px solid var(--color-line-soft); font-size: 0.95rem; line-height: 1.5; }
    .prop-comment:last-child { border-bottom: 0; }
    .prop-comment strong { color: var(--color-ink); }
    .prop-comment small { color: var(--color-ink-soft); font-size: 0.78rem; margin-left: 6px; }
    .add-comment { margin-top: 18px; display: flex; gap: 10px; flex-direction: column; }
    .add-comment input, .add-comment textarea { padding: 10px 12px; border: 1px solid var(--color-line); font: inherit; font-size: 0.95rem; }
    .doc-status { padding: 24px; text-align: center; background: rgba(61,107,61,.08); border: 1px solid rgba(61,107,61,.3); color: #3d6b3d; margin-top: 30px; }
    .doc-status h3 { font-family: var(--font-display); font-weight: 400; font-size: 1.4rem; margin: 0 0 8px; color: #3d6b3d; }
  </style>
</head>
<body>

  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a class="nav__brand" href="/" aria-label="Stately Shades home">
        <span class="nav__monogram" aria-hidden="true">S<span>S</span></span>
        <span class="nav__lockup">
          <span class="nav__wordmark">STATELY SHADES</span>
          <span class="nav__rule" aria-hidden="true"></span>
          <span class="nav__tagline">Blinds, Shutters &amp; Shades</span>
        </span>
      </a>
    </div>
  </header>

  <main class="prop-wrap" id="root">
    <p style="text-align:center;color:var(--color-ink-soft);font-style:italic">Loading your proposal…</p>
  </main>

  <script>
  let state = {};
  (async () => {
    const token = new URLSearchParams(location.search).get("t");
    if (!token) { document.getElementById("root").innerHTML = `<p style="text-align:center;color:#B85450">Missing access link.</p>`; return; }
    try {
      const res = await fetch("/api/public/proposal/" + encodeURIComponent(token));
      state = await res.json();
      if (!res.ok) throw new Error(state.error || "Not found");
      state.token = token;
      render();
    } catch (e) {
      document.getElementById("root").innerHTML = `<p style="text-align:center;color:#B85450">${esc(e.message)}</p>`;
    }
  })();

  function render() {
    const p = state.proposal;
    const isAccepted = p.status === "accepted";
    document.getElementById("root").innerHTML = `
      <div class="prop-head">
        <span class="eyebrow">Proposal</span>
        <h1>${esc(p.project_name)}</h1>
        <div style="margin-top:14px;font-family:var(--font-mono);font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--color-ink-soft)">${esc(p.number)}${p.valid_until ? " · Valid until " + esc(p.valid_until) : ""}</div>
      </div>
      ${p.intro ? `<div class="prop-intro">${esc(p.intro)}</div>` : ""}
      <div class="prop-tiers">${state.tiers.map(renderTier).join("")}</div>
      ${isAccepted ? renderAccepted(p) : (p.selected_tier ? renderAcceptForm(p) : "")}
      ${renderComments()}
    `;
  }
  function renderTier(t) {
    const isSel = state.proposal.selected_tier === t.tier;
    return `<div class="prop-tier${isSel ? " is-selected" : ""}" data-tier="${t.tier}">
      <span class="prop-tier__label">${t.tier.toUpperCase()}</span>
      <h2 class="prop-tier__title">${esc(t.title || "")}</h2>
      <div class="prop-tier__total">${fmtMoney(t.total_cents)}<small>Total installed</small></div>
      ${t.description ? `<p style="color:var(--color-ink-soft);font-size:.92rem;font-style:italic;margin:0 0 14px">${esc(t.description)}</p>` : ""}
      <ul class="prop-tier__lines">${t.lines.map((l) => `
        <li>
          <span class="money">${fmtMoney(l.line_total_cents)}</span>
          <strong>${esc(l.room || l.description.split(":")[0])}</strong>
          ${esc(l.description.replace(/^[^:]+:\s*/, ''))}
        </li>`).join("") || `<li style="color:var(--color-ink-soft);font-style:italic;text-align:center">No items yet.</li>`}
      </ul>
      <div class="prop-tier__select">
        ${state.proposal.status === "accepted" ? "" : `<button class="btn ${isSel ? '' : 'btn--ghost'}" onclick="selectTier('${t.tier}')">${isSel ? '✓ Selected' : 'Choose this tier'}</button>`}
      </div>
    </div>`;
  }
  function renderAcceptForm(p) {
    const tier = state.tiers.find((t) => t.tier === p.selected_tier);
    return `<div class="prop-accept">
      <span class="eyebrow" style="color:var(--color-champagne)">Ready to move forward?</span>
      <h2>Accept the <em>${esc(tier.title)}</em>.</h2>
      <p>You're choosing <strong>${esc(tier.title)}</strong> at <strong>${fmtMoney(tier.total_cents)}</strong>. We'll prepare the formal contract and email it within one business day.</p>
      <input type="text" id="accept-name" placeholder="Type your full name to accept" />
      <button class="btn" onclick="accept()">Accept Proposal</button>
    </div>`;
  }
  function renderAccepted(p) {
    return `<div class="doc-status">
      <h3>Accepted ✓</h3>
      <p>You've accepted the <strong>${esc(p.selected_tier)}</strong> tier at <strong>${fmtMoney(p.selected_total_cents)}</strong>${p.accepted_at ? ` on ${esc(p.accepted_at.slice(0, 10))}` : ""}.</p>
      <p>We'll prepare and email your contract within one business day.</p>
    </div>`;
  }
  function renderComments() {
    return `<div class="prop-comments">
      <h2>Questions &amp; comments</h2>
      ${state.comments.map((c) => `<div class="prop-comment"><strong>${esc(c.author_name || c.author_kind)}</strong>${c.tier ? ` <small>(${esc(c.tier)})</small>` : ""}<small>${fmtDate(c.created_at)}</small><div style="margin-top:4px">${esc(c.body)}</div></div>`).join("") || `<p style="color:var(--color-ink-soft);font-style:italic">No comments yet. Use the form below to ask a question.</p>`}
      <div class="add-comment">
        <input type="text" id="c-name" placeholder="Your name" />
        <textarea id="c-body" rows="3" placeholder="Your question or comment…"></textarea>
        <button class="btn btn--ghost" onclick="addComment()">Send comment</button>
      </div>
    </div>`;
  }

  async function selectTier(tier) {
    const r = await fetch("/api/public/proposal/" + state.token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "select_tier", tier }) });
    const out = await r.json();
    if (out.ok) { state.proposal.selected_tier = tier; render(); } else alert(out.error || "Couldn't select tier");
  }
  async function accept() {
    const name = document.getElementById("accept-name").value.trim();
    if (!name) { alert("Please type your name."); return; }
    const r = await fetch("/api/public/proposal/" + state.token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "accept", name }) });
    const out = await r.json();
    if (out.ok) location.reload(); else alert(out.error || "Couldn't accept");
  }
  async function addComment() {
    const name = document.getElementById("c-name").value.trim();
    const body = document.getElementById("c-body").value.trim();
    if (!body) return;
    const r = await fetch("/api/public/proposal/" + state.token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "comment", name, body }) });
    const out = await r.json();
    if (out.ok) location.reload(); else alert(out.error || "Couldn't post");
  }

  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function fmtMoney(c) { return "$" + (c / 100).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
  function fmtDate(iso) { if (!iso) return ""; const d = new Date(iso.replace(" ","T")+"Z"); return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }); }
  </script>
</body>
</html>
