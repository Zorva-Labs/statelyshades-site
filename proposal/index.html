<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Your Proposal · Stately Shades</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css?v=blog10"/>
  <style>
    .doc { max-width: 1100px; margin: 0 auto; padding: clamp(60px, 10vw, 120px) clamp(20px, 4vw, 40px) 80px; }
    .doc-mast { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 28px; border-bottom: 1px solid var(--color-line); margin-bottom: 36px; }
    .doc-brand { font-family: var(--font-display); font-size: 1.5rem; }
    .doc-brand small { display: block; font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.28em; color: var(--color-brass); text-transform: uppercase; margin-top: 4px; }
    .doc h1 { font-family: var(--font-display); font-size: clamp(2.2rem, 4.5vw, 3.2rem); font-weight: 400; letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 16px; }
    .doc h1 em { color: var(--color-brass); }
    .doc-intro { font-family: var(--font-display); font-style: italic; font-size: 1.15rem; line-height: 1.55; color: var(--color-ink-soft); max-width: 60ch; margin-bottom: 50px; }
    .tier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
    @media (max-width: 900px) { .tier-grid { grid-template-columns: 1fr; } }
    .tier { background: #fff; border: 1px solid var(--color-line); padding: 32px 26px; display: flex; flex-direction: column; transition: all 200ms ease; cursor: pointer; }
    .tier:hover { box-shadow: 0 12px 32px -16px rgba(20,17,13,.2); transform: translateY(-2px); }
    .tier.is-picked { border-color: var(--color-brass); border-width: 2px; padding: 31px 25px; box-shadow: 0 16px 40px -16px rgba(157,122,62,.4); }
    .tier__label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--color-brass); }
    .tier__title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 400; margin: 10px 0 16px; line-height: 1.1; color: var(--color-ink); }
    .tier__total { font-family: var(--font-display); font-size: 2.2rem; font-weight: 500; color: var(--color-ink); margin-bottom: 18px; font-variant-numeric: tabular-nums; }
    .tier__desc { font-style: italic; color: var(--color-ink-soft); font-family: var(--font-display); margin-bottom: 16px; }
    .tier__lines { list-style: none; padding: 0; margin: 0; flex: 1; }
    .tier__lines li { padding: 9px 0; border-bottom: 1px solid var(--color-line-soft); display: flex; justify-content: space-between; gap: 12px; font-size: 0.92rem; }
    .tier__lines li:last-child { border-bottom: 0; }
    .tier__lines li .ln-money { color: var(--color-ink); font-variant-numeric: tabular-nums; font-weight: 500; flex-shrink: 0; }
    .tier-btn { margin-top: 24px; padding: 14px 22px; background: var(--color-ink); color: var(--color-bg); border: 0; font: inherit; font-family: var(--font-mono); font-size: 0.74rem; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; }
    .tier.is-picked .tier-btn { background: var(--color-brass); }
    .accept-bar { background: var(--color-espresso); color: var(--color-bg); padding: 36px; text-align: center; margin-top: 40px; }
    .accept-bar h2 { font-family: var(--font-display); font-weight: 400; font-size: 1.9rem; color: var(--color-bg); margin: 0 0 10px; }
    .accept-bar p { color: rgba(247,242,234,.82); font-family: var(--font-display); font-style: italic; margin: 0 0 20px; }
    .accept-btn { padding: 16px 32px; background: var(--color-champagne); color: var(--color-ink); border: 0; font: inherit; font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; font-weight: 600; }
    .doc-status { padding: 30px; background: var(--color-bg-2); border-left: 4px solid var(--color-brass); margin-top: 40px; }
  </style>
</head>
<body>
<main class="doc" id="root"><p style="text-align:center;color:var(--color-ink-soft);padding:40px">Loading…</p></main>
<script>
const token = new URLSearchParams(location.search).get("t");
if (!token) document.getElementById("root").innerHTML = `<p style="color:#B85450;text-align:center">Missing token.</p>`;
else load();

let proposal = null;
async function load() {
  try {
    const data = await (await fetch("/api/public/proposal/" + token)).json();
    if (data.error) throw new Error(data.error);
    proposal = data.proposal;
    render(data.proposal, data.tiers);
  } catch (e) { document.getElementById("root").innerHTML = `<p style="color:#B85450;text-align:center;padding:40px">${esc(e.message)}</p>`; }
}

function render(p, tiers) {
  const isAccepted = p.status === "accepted";
  document.title = `${p.number} · Your Proposal · Stately Shades`;
  document.getElementById("root").innerHTML = `
    <div class="doc-mast">
      <div class="doc-brand">Stately Shades<small>Blinds, Shutters &amp; Shades</small></div>
      <div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--color-ink-soft)">${esc(p.number)}</div>
    </div>
    <h1>Your <em>proposal</em>, three ways.</h1>
    <p class="doc-intro">${esc(p.intro || "")}</p>

    <div class="tier-grid">${tiers.map((t) => `
      <div class="tier ${p.selected_tier === t.tier ? "is-picked" : ""}" data-tier="${t.tier}">
        <div class="tier__label">${esc(t.tier)} · ${esc(t.title || "")}</div>
        <div class="tier__total">${money(t.total_cents)}</div>
        ${t.description ? `<div class="tier__desc">${esc(t.description)}</div>` : ""}
        <ul class="tier__lines">${(t.lines || []).map((l) => `<li><span>${esc(l.description)}${l.room ? ` <em style="color:var(--color-ink-soft);font-size:0.85em">— ${esc(l.room)}</em>` : ""}</span><span class="ln-money">${money(l.line_total_cents)}</span></li>`).join("")}</ul>
        ${!isAccepted ? `<button class="tier-btn" onclick="pickTier('${t.tier}')">${p.selected_tier === t.tier ? "✓ Picked" : "Choose " + t.tier}</button>` : ""}
      </div>`).join("")}
    </div>

    ${isAccepted ? `
      <div class="doc-status">
        <h2 style="font-family:var(--font-display);font-weight:400;font-size:1.6rem;margin:0 0 8px;color:var(--color-ink)">You accepted the ${esc(p.selected_tier)} tier.</h2>
        <p style="font-style:italic;color:var(--color-ink-soft);margin:0">Thank you. We'll send the contract over shortly for signature to book the job.</p>
      </div>
    ` : (p.selected_tier ? `
      <div class="accept-bar">
        <h2>Ready to book the job?</h2>
        <p>Accept the ${esc(p.selected_tier)} tier and we'll send the contract over for signature.</p>
        <button class="accept-btn" onclick="accept()">Accept &amp; book the job</button>
      </div>` : `
      <div class="accept-bar" style="background:var(--color-bg-2);color:var(--color-ink-soft)">
        <h2 style="color:var(--color-ink)">Pick a tier above to continue</h2>
        <p style="color:var(--color-ink-soft)">Or call/text us at <a href="tel:+16292988241" style="color:var(--color-ink);border-bottom:1px solid var(--color-brass)">629-298-8241</a> with questions.</p>
      </div>`)}
  `;
}

async function pickTier(tier) {
  try {
    const res = await fetch("/api/public/proposal/" + token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "select_tier", tier }) });
    if (!res.ok) throw new Error("Couldn't select tier");
    load();
  } catch (e) { alert(e.message); }
}

async function accept() {
  const name = prompt("Type your full legal name to accept this proposal:");
  if (!name) return;
  try {
    const res = await fetch("/api/public/proposal/" + token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "accept", name }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Couldn't accept.");

    // Auto-flow: if the backend created a contract, jump to it for signature
    if (data.contract_token) {
      // Show a brief celebration before redirecting
      document.querySelector(".doc").innerHTML = `
        <div style="text-align:center;padding:80px 20px">
          <div style="font-family:var(--font-display);font-size:2.4rem;color:var(--color-brass);margin-bottom:14px">Accepted.</div>
          <p style="color:var(--color-ink-soft);font-family:var(--font-display);font-style:italic;font-size:1.15rem;margin-bottom:24px">Taking you to the contract to book the job…</p>
          <div style="display:inline-block;width:24px;height:24px;border:3px solid var(--color-line);border-top-color:var(--color-brass);border-radius:50%;animation:spin 800ms linear infinite"></div>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      `;
      setTimeout(() => { location.href = "/contract/?t=" + data.contract_token + "&from=proposal"; }, 1400);
    } else {
      // Conversion failed — show the success state but no contract yet
      load();
    }
  } catch (e) { alert(e.message); }
}

function money(c) { if (c == null) return "—"; return "$" + (c / 100).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
</script>
</body>
</html>
