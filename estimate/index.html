<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Estimate · Stately Shades</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=blog9" />
  <style>
    .doc-wrap { max-width: 900px; margin: 0 auto; padding: clamp(120px, 16vw, 200px) var(--gutter) clamp(80px, 12vw, 120px); }
    .doc-head { text-align: center; margin-bottom: clamp(40px, 6vw, 70px); }
    .doc-head h1 { font-size: clamp(2.4rem, 5vw, 3.8rem); font-family: var(--font-display); font-weight: 400; margin: 18px 0 0; }
    .doc-head h1 em { color: var(--color-brass); }
    .doc-meta { display: flex; justify-content: center; gap: 22px; flex-wrap: wrap; margin-top: 20px; font-family: var(--font-mono); font-size: 0.78rem; color: var(--color-ink-soft); letter-spacing: 0.15em; text-transform: uppercase; }
    .doc-card { background: #fff; border: 1px solid var(--color-line-soft); padding: clamp(28px, 4vw, 44px); margin-bottom: 22px; }
    .doc-card h2 { font-family: var(--font-display); font-weight: 400; font-size: 1.6rem; margin: 0 0 18px; }
    .doc-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; }
    .doc-info span { display: block; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-ink-soft); margin-bottom: 4px; }
    .doc-info strong { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; color: var(--color-ink); }
    .doc-lines { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .doc-lines th, .doc-lines td { padding: 14px 8px; border-bottom: 1px solid var(--color-line-soft); text-align: left; font-size: 0.96rem; vertical-align: top; }
    .doc-lines th { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-brass); font-weight: 500; }
    .doc-lines td.num, .doc-lines th.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .doc-lines tfoot td { border-bottom: 0; font-weight: 600; font-family: var(--font-display); font-size: 1.05rem; }
    .doc-lines tfoot td.grand { font-size: 1.4rem; padding-top: 18px; border-top: 2px solid var(--color-ink); }
    .doc-notes { background: var(--color-bg-2); border-left: 3px solid var(--color-brass); padding: 18px 22px; margin-top: 18px; font-family: var(--font-display); font-style: italic; line-height: 1.55; }
    .doc-actions { display: flex; gap: 14px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
    .doc-actions button, .doc-actions .btn { min-width: 200px; }
    .doc-status { padding: 24px; text-align: center; background: rgba(61,107,61,.08); border: 1px solid rgba(61,107,61,.3); color: #3d6b3d; margin-top: 30px; }
    .doc-status h3 { font-family: var(--font-display); font-weight: 400; font-size: 1.4rem; margin: 0 0 8px; color: #3d6b3d; }
    @media print {
      .nav, .doc-actions, .mobile-cta { display: none !important; }
      .doc-wrap { padding-top: 20px; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a class="nav__brand" href="/" aria-label="Stately Shades home">
        <span class="nav__monogram" aria-hidden="true">S<span>S</span></span>
        <span class="nav__lockup">
          <span class="nav__wordmark">STATELY SHADES</span>
          <span class="nav__rule" aria-hidden="true"></span>
          <span class="nav__tagline">Blinds, Shutters &amp; Shades</span>
        </span>
      </a>
    </div>
  </header>

  <main class="doc-wrap" id="root">
    <p style="text-align:center;color:var(--color-ink-soft);font-style:italic">Loading your estimate…</p>
  </main>

  <script>
  (async () => {
    const token = new URLSearchParams(location.search).get("t");
    if (!token) { document.getElementById("root").innerHTML = `<p style="text-align:center;color:#B85450">Missing access link.</p>`; return; }
    try {
      const res = await fetch("/api/public/estimate/" + encodeURIComponent(token));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Not found");
      render(data.estimate, data.lines);
    } catch (e) {
      document.getElementById("root").innerHTML = `<p style="text-align:center;color:#B85450">${esc(e.message)} — call us at <a href="tel:+16292988241">629-298-8241</a>.</p>`;
    }
  })();

  function render(e, lines) {
    const isDone = ["approved", "declined", "expired"].includes(e.status);
    document.getElementById("root").innerHTML = `
      <div class="doc-head">
        <span class="eyebrow">Estimate</span>
        <h1>${esc(e.project_name)}</h1>
        <div class="doc-meta">
          <span><strong>${esc(e.number)}</strong></span>
          ${e.valid_until ? `<span>Valid until ${esc(e.valid_until)}</span>` : ""}
          <span>Status: ${esc(e.status)}</span>
        </div>
      </div>

      <div class="doc-card">
        <div class="doc-info">
          <div><span>Prepared for</span><strong>${esc(e.contact_name)}</strong></div>
          <div><span>Email</span><strong>${esc(e.contact_email)}</strong></div>
          ${e.contact_phone ? `<div><span>Phone</span><strong>${esc(e.contact_phone)}</strong></div>` : ""}
        </div>
      </div>

      <div class="doc-card">
        <h2>Line items</h2>
        <table class="doc-lines">
          <thead><tr>
            <th style="width:18%">Room</th><th>Item</th>
            <th class="num" style="width:10%">Qty</th>
            <th class="num" style="width:14%">Unit</th>
            <th class="num" style="width:14%">Total</th>
          </tr></thead>
          <tbody>${lines.map((l) => `
            <tr>
              <td>${esc(l.room || "")}</td>
              <td>${esc(l.description)}${l.width_in && l.height_in ? ` <span style="color:var(--color-ink-soft);font-size:.86rem">${l.width_in}″ × ${l.height_in}″</span>` : ""}</td>
              <td class="num">${l.quantity}</td>
              <td class="num">${fmtMoney(l.unit_price_cents)}</td>
              <td class="num">${fmtMoney(l.line_total_cents)}</td>
            </tr>`).join("") || `<tr><td colspan="5" style="color:var(--color-ink-soft);font-style:italic;text-align:center;padding:30px">No line items yet.</td></tr>`}
          </tbody>
          <tfoot>
            <tr><td colspan="4" class="num">Subtotal</td><td class="num">${fmtMoney(e.subtotal_cents)}</td></tr>
            ${e.discount_cents ? `<tr><td colspan="4" class="num">Discount</td><td class="num">−${fmtMoney(e.discount_cents)}</td></tr>` : ""}
            ${e.tax_cents ? `<tr><td colspan="4" class="num">Tax</td><td class="num">${fmtMoney(e.tax_cents)}</td></tr>` : ""}
            <tr><td colspan="4" class="num grand">Total</td><td class="num grand">${fmtMoney(e.total_cents)}</td></tr>
          </tfoot>
        </table>
        ${e.notes_customer ? `<div class="doc-notes">${esc(e.notes_customer)}</div>` : ""}
      </div>

      ${isDone ? renderStatus(e) : renderActions(e)}
    `;
  }

  function renderActions(e) {
    return `
      <div class="doc-actions">
        <button class="btn btn--ghost" onclick="window.print()">Print / Save PDF</button>
        <button class="btn" onclick="approve()">Approve this estimate</button>
        <button class="btn btn--ghost" style="color:#B85450" onclick="decline()">Decline</button>
      </div>
      <p style="text-align:center;color:var(--color-ink-soft);font-size:.88rem;margin-top:20px">Approving moves us forward to scheduling install. Questions? Reply to the email this came from or call <a href="tel:+16292988241">629-298-8241</a>.</p>
    `;
  }

  function renderStatus(e) {
    if (e.status === "approved") {
      return `<div class="doc-status">
        <h3>Approved ✓</h3>
        <p>Approved by <strong>${esc(e.approved_by_name || "you")}</strong>${e.approved_at ? ` on ${esc(e.approved_at.slice(0, 10))}` : ""}.</p>
        <p style="margin-top:10px">We'll be in touch about install scheduling.</p>
      </div>`;
    }
    if (e.status === "declined") {
      return `<div class="doc-status" style="background:rgba(184,84,80,.06);border-color:rgba(184,84,80,.3);color:#B85450"><h3 style="color:#B85450">Declined</h3><p>If you'd like to revisit, just call us at <a href="tel:+16292988241">629-298-8241</a>.</p></div>`;
    }
    return `<div class="doc-status" style="background:#f3eedf;color:var(--color-ink-soft)"><h3 style="color:var(--color-ink-soft)">Expired</h3><p>This estimate has expired. Please reach out and we'll refresh it.</p></div>`;
  }

  async function approve() {
    const name = prompt("Type your full name to approve this estimate:");
    if (!name) return;
    try {
      const res = await fetch(location.pathname.replace("/estimate", "/api/public/estimate") + "/" + new URLSearchParams(location.search).get("t"), {});
    } catch (_) {}
    // Direct fetch:
    const token = new URLSearchParams(location.search).get("t");
    const r = await fetch("/api/public/estimate/" + token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "approve", name }) });
    const out = await r.json();
    if (out.ok) location.reload(); else alert(out.error || "Could not approve");
  }
  async function decline() {
    if (!confirm("Decline this estimate?")) return;
    const token = new URLSearchParams(location.search).get("t");
    const r = await fetch("/api/public/estimate/" + token, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "decline" }) });
    const out = await r.json();
    if (out.ok) location.reload(); else alert(out.error || "Could not decline");
  }

  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function fmtMoney(c) { return "$" + (c / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  </script>
</body>
</html>
