<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Activity · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="/crm/crm-app.css"/></head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
(async () => {
  const user = await SSCrm.mount({ title: "Activity", subtitle: "Every action across the system", wide: true });
  if (!user) return;
  const { activity } = await SSCrm.fetchJSON("/api/activity?limit=200");
  const page = document.getElementById("page");
  if (!activity.length) { page.innerHTML = `<div class="card"><p class="muted center" style="padding:40px">No activity yet.</p></div>`; return; }
  // Group by day
  const groups = {};
  for (const a of activity) {
    const d = (a.created_at || "").slice(0, 10);
    (groups[d] ||= []).push(a);
  }
  page.innerHTML = Object.keys(groups).sort().reverse().map((d) => `
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><h2>${prettyDate(d)}</h2><span class="muted" style="font-size:12px">${groups[d].length} event${groups[d].length === 1 ? "" : "s"}</span></div>
      <ul class="activity">${groups[d].map((a) => `
        <li>
          <span class="activity__icon" data-k="${SSCrm.esc(a.action)}">${actionIcon(a.action)}</span>
          <div class="activity__body">
            <a href="${entityLink(a.entity_type, a.entity_id)}"><strong>${SSCrm.esc(verb(a.action))}</strong></a>
            ${SSCrm.esc(a.entity_type)} #${a.entity_id}
            ${a.actor_name ? ` · by ${SSCrm.esc(a.actor_name)}` : ""}
            <div class="activity__time">${SSCrm.fmtTime(a.created_at)}</div>
          </div>
        </li>`).join("")}</ul>
    </div>
  `).join("");
})();
function prettyDate(d) { const date = new Date(d + "T12:00:00Z"); const today = new Date().toISOString().slice(0, 10); if (d === today) return "Today"; return date.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" }); }
function entityLink(t, id) { return ({ appointment: "/crm/calendar.html?focus=" + id, contact: "/crm/contact.html?id=" + id, project: "/crm/project.html?id=" + id, estimate: "/crm/estimate.html?id=" + id, proposal: "/crm/proposal.html?id=" + id, contract: "/crm/contract.html?id=" + id })[t] || "#"; }
function verb(a) { return ({ booked: "Booked", created: "Created", sent: "Sent", viewed: "Viewed", approved: "Approved", "signed-by-customer": "Customer signed", "counter-signed": "Counter-signed", accepted: "Accepted", "tier-selected": "Picked tier", cancelled: "Cancelled", updated: "Updated", "created-from-proposal": "Drafted from proposal", "comment-added": "Commented", "cancelled-by-customer": "Cancelled (customer)" })[a] || a; }
function actionIcon(a) { if (["signed-by-customer", "counter-signed", "accepted", "approved"].includes(a)) return "✓"; if (a === "sent") return "→"; if (a === "viewed") return "👁"; if (["booked", "created", "created-from-proposal"].includes(a)) return "+"; return "·"; }
</script></body></html>
