<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Products · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="/crm/crm-app.css"/></head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
(async () => {
  const user = await SSCrm.mount({ title: "Products", subtitle: "Priced product catalog used in estimates &amp; proposals",
    actions: `<button class="btn primary" onclick="newProd()">+ New product</button>`, wide: true });
  if (!user) return;
  await load();
})();
async function load() {
  const { products } = await SSCrm.fetchJSON("/api/products");
  const grouped = {};
  for (const p of products) (grouped[p.category] ||= []).push(p);
  const page = document.getElementById("page");
  page.innerHTML = Object.keys(grouped).sort().map((cat) => `
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><h2>${SSCrm.esc(cat)}</h2><span class="muted" style="font-size:12px">${grouped[cat].length} item${grouped[cat].length === 1 ? "" : "s"}</span></div>
      <div class="tbl" style="border:0"><table>
        <thead><tr><th>SKU</th><th>Name</th><th>Unit</th><th class="num">Base $</th><th class="num">Per sq ft</th><th></th></tr></thead>
        <tbody>${grouped[cat].map((p) => `<tr data-id="${p.id}">
          <td class="mono" style="font-size:12px;color:var(--ink-soft)">${SSCrm.esc(p.sku || "")}</td>
          <td>${SSCrm.esc(p.name)}</td>
          <td class="muted" style="font-size:12px">${SSCrm.esc(p.unit)}</td>
          <td class="money">${SSCrm.fmtMoney(p.base_price_cents)}</td>
          <td class="num muted">${p.price_per_sqft_cents ? SSCrm.fmtMoney(p.price_per_sqft_cents) : "—"}</td>
          <td><button class="rm" onclick="delProd(${p.id})" title="Archive">×</button></td>
        </tr>`).join("")}</tbody></table></div>
    </div>
  `).join("");
}
async function newProd() {
  const name = prompt("Product name?"); if (!name) return;
  const cat = prompt("Category (faux-wood, real-wood, cellular, sheer, plantation, drapery, outdoor, install, repair, etc.)?", "faux-wood"); if (!cat) return;
  const price = prompt("Base price in cents? (8900 = $89.00)", "0");
  try { await SSCrm.fetchJSON("/api/products", { method: "POST", body: JSON.stringify({ name, category: cat, base_price_cents: parseInt(price || 0, 10) }) }); load(); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
async function delProd(id) {
  if (!(await SSCrm.confirmDialog("Archive this product? It stays in old estimates but won't appear in new ones."))) return;
  try { await SSCrm.fetchJSON("/api/products/" + id, { method: "DELETE" }); load(); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
</script></body></html>
