<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimate · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/crm/crm-app.css" />
</head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
const id = parseInt(new URLSearchParams(location.search).get("id"), 10);
if (!id) location.href = "/crm/estimates.html";
let state, products = [];

(async () => {
  const user = await SSCrm.mount({ title: "Estimate", actions: `<a class="btn ghost" href="/crm/estimates.html">← Estimates</a>` });
  if (!user) return;
  [state, productsBundle] = await Promise.all([
    SSCrm.fetchJSON("/api/estimates/" + id),
    SSCrm.fetchJSON("/api/products"),
  ]);
  products = productsBundle.products;
  render();
})();
let productsBundle;

function render() {
  const { estimate: e, lines } = state;
  document.getElementById("page-title").textContent = `${e.number || "Draft estimate"} · ${SSCrm.fmtMoney(e.total_cents)}`;
  const isSent = ["sent","viewed","approved","declined"].includes(e.status);
  const customerUrl = `${location.origin}/estimate/?t=${e.view_token}`;

  document.getElementById("page").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:10px;align-items:center">
        ${SSCrm.pill(e.status)}
        <span class="muted" style="font-size:13px">${SSCrm.esc(e.project_name)} · <a href="/crm/contact.html?id=${e.contact_id}">${SSCrm.esc(e.contact_name)}</a></span>
      </div>
      <div style="display:flex;gap:8px">
        ${e.status === "approved" ? `<button class="btn success" onclick="convertToContract()">Convert to Contract →</button>` : ""}
        ${!isSent ? `<button class="btn primary" onclick="sendEstimate()">Send to customer</button>` : ""}
        ${isSent ? `<a class="btn secondary" href="${customerUrl}" target="_blank">Customer link ↗</a>` : ""}
        <button class="btn danger" onclick="del()">Delete</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h2>Line items</h2><span class="muted" style="font-size:12px">${lines.length} item${lines.length === 1 ? "" : "s"}</span></div>
      <table class="lines"><thead><tr>
        <th style="width:40%">Description</th><th>Room</th><th class="num">Qty</th><th class="num">Unit $</th><th class="num">Total</th><th></th>
      </tr></thead><tbody id="lines-body">
        ${lines.length ? lines.map((l, i) => lineRow(l, i)).join("") : lineRow({}, 0)}
      </tbody></table>
      <div class="add"><button onclick="addLine()">+ Line item</button> <button onclick="addFromProduct()">+ Pick from catalog</button></div>

      <div class="totals">
        <div class="r"><span>Subtotal</span><span id="t-sub">${SSCrm.fmtMoney(e.subtotal_cents)}</span></div>
        <div class="r"><span>Discount</span><input id="t-disc" type="text" value="${e.discount_cents ? "$" + (e.discount_cents/100).toFixed(2) : ""}" placeholder="$0.00" style="width:110px;text-align:right;border:1px solid var(--line);padding:5px 8px;border-radius:var(--r-sm)" onchange="recalcTotals()"/></div>
        <div class="r"><span>Tax</span><input id="t-tax" type="text" value="${e.tax_cents ? "$" + (e.tax_cents/100).toFixed(2) : ""}" placeholder="$0.00" style="width:110px;text-align:right;border:1px solid var(--line);padding:5px 8px;border-radius:var(--r-sm)" onchange="recalcTotals()"/></div>
        <div class="r grand"><span>Total</span><span id="t-grand">${SSCrm.fmtMoney(e.total_cents)}</span></div>
      </div>

      <hr class="sep"/>
      <div class="form">
        <label><span>Notes to customer (shown on the estimate)</span><textarea id="notes-c" rows="3">${SSCrm.esc(e.notes_customer || "")}</textarea></label>
        <label><span>Internal notes (staff only)</span><textarea id="notes-i" rows="2">${SSCrm.esc(e.notes_internal || "")}</textarea></label>
        <div class="form-actions"><button class="btn primary" onclick="save()">Save changes</button></div>
      </div>
    </div>
  `;
}

function lineRow(l, i) {
  const total = (Number(l.quantity || 1)) * (l.unit_price_cents || 0);
  return `<tr data-i="${i}">
    <td><input data-f="description" value="${SSCrm.esc(l.description || "")}" placeholder="Living Room — North: Faux Wood 2.5″"/></td>
    <td><input data-f="room" value="${SSCrm.esc(l.room || "")}" placeholder="Living"/></td>
    <td><input class="num" data-f="quantity" value="${l.quantity || 1}" type="number" step="1" min="0" onchange="recalc(this)"/></td>
    <td><input class="num" data-f="unit" value="${l.unit_price_cents ? "$" + (l.unit_price_cents / 100).toFixed(2) : ""}" placeholder="$0.00" onchange="recalc(this)"/></td>
    <td class="num money money-line">${SSCrm.fmtMoney(total)}</td>
    <td><button class="rm" onclick="this.closest('tr').remove();recalcTotals()" title="Remove">×</button></td>
  </tr>`;
}

function addLine() { const t = document.getElementById("lines-body"); t.insertAdjacentHTML("beforeend", lineRow({}, t.children.length)); }
function recalc(input) {
  const tr = input.closest("tr");
  const qty = Number(tr.querySelector("[data-f=quantity]").value || 0);
  const unit = SSCrm.parseMoney(tr.querySelector("[data-f=unit]").value);
  tr.querySelector(".money-line").textContent = SSCrm.fmtMoney(qty * unit);
  recalcTotals();
}
function recalcTotals() {
  let sub = 0;
  document.querySelectorAll("#lines-body tr").forEach((tr) => {
    const qty = Number(tr.querySelector("[data-f=quantity]").value || 0);
    const unit = SSCrm.parseMoney(tr.querySelector("[data-f=unit]").value);
    sub += qty * unit;
  });
  const disc = SSCrm.parseMoney(document.getElementById("t-disc").value);
  const tax = SSCrm.parseMoney(document.getElementById("t-tax").value);
  document.getElementById("t-sub").textContent = SSCrm.fmtMoney(sub);
  document.getElementById("t-grand").textContent = SSCrm.fmtMoney(sub - disc + tax);
}

function addFromProduct() {
  const choices = products.map((p) => `${p.category} · ${p.name} — ${SSCrm.fmtMoney(p.base_price_cents)}`);
  const picked = prompt("Pick a product:\n\n" + choices.map((c, i) => `${i + 1}. ${c}`).join("\n") + "\n\nEnter the number:");
  const idx = parseInt(picked, 10) - 1;
  if (!products[idx]) return;
  const p = products[idx];
  const t = document.getElementById("lines-body");
  t.insertAdjacentHTML("beforeend", lineRow({ description: p.name, unit_price_cents: p.base_price_cents, quantity: 1 }, t.children.length));
  recalcTotals();
}

async function save() {
  const lines = [...document.querySelectorAll("#lines-body tr")].map((tr) => ({
    description: tr.querySelector("[data-f=description]").value.trim(),
    room: tr.querySelector("[data-f=room]").value.trim() || null,
    quantity: Number(tr.querySelector("[data-f=quantity]").value || 1),
    unit_price_cents: SSCrm.parseMoney(tr.querySelector("[data-f=unit]").value),
  })).filter((l) => l.description);
  try {
    await SSCrm.fetchJSON("/api/estimates/" + id, { method: "PATCH", body: JSON.stringify({
      lines,
      discount_cents: SSCrm.parseMoney(document.getElementById("t-disc").value),
      tax_cents: SSCrm.parseMoney(document.getElementById("t-tax").value),
      notes_customer: document.getElementById("notes-c").value.trim() || null,
      notes_internal: document.getElementById("notes-i").value.trim() || null,
    })});
    SSCrm.toast("Saved", "success");
    state = await SSCrm.fetchJSON("/api/estimates/" + id);
    render();
  } catch (e) { SSCrm.toast(e.message, "error"); }
}
async function sendEstimate() {
  if (!(await SSCrm.confirmDialog("Send this estimate to the customer by email?"))) return;
  try { await SSCrm.fetchJSON(`/api/estimates/${id}/send`, { method: "POST" }); SSCrm.toast("Estimate sent", "success"); state = await SSCrm.fetchJSON("/api/estimates/" + id); render(); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
async function convertToContract() {
  if (!(await SSCrm.confirmDialog("Create a draft contract from this estimate's line items?"))) return;
  try {
    const { id: nid } = await SSCrm.fetchJSON("/api/contracts", { method: "POST", body: JSON.stringify({ project_id: state.estimate.project_id, estimate_id: id }) });
    location.href = "/crm/contract.html?id=" + nid;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}
async function del() {
  if (!(await SSCrm.confirmDialog("Delete this estimate? Cannot be undone."))) return;
  await SSCrm.fetchJSON("/api/estimates/" + id, { method: "DELETE" });
  location.href = "/crm/estimates.html";
}
</script>
</body>
</html>
