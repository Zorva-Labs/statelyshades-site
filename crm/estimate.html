<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimate · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/crm/admin.css" />
</head>
<body>
<div id="app"></div>
<script src="/crm/admin.js"></script>
<script>
const id = new URLSearchParams(location.search).get("id");
let products = [];

(async () => {
  if (!id) { location.href = "/crm/estimates.html"; return; }
  const user = await SSAdmin.mount({ title: "Estimate", actions: `<a class="btn-secondary" href="/crm/estimates.html">← All estimates</a>` });
  if (!user) return;
  ({ products } = await SSAdmin.fetchJSON("/api/products"));
  await render();
})();

async function render() {
  const { estimate, lines } = await SSAdmin.fetchJSON("/api/estimates/" + id);
  document.getElementById("page-title").innerHTML = `${SSAdmin.esc(estimate.number)} · <em>${SSAdmin.esc(estimate.project_name)}</em>`;
  const customerURL = `/estimate/?t=${estimate.view_token}`;

  document.getElementById("page").innerHTML = `
    <div class="cols-2">
      <div>
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <h2>Line items</h2>
            <button class="btn-ghost" onclick="addLine()">+ Line</button>
          </div>
          <table class="lines-table" id="lines">
            <thead><tr>
              <th style="width:18%">Room</th>
              <th style="width:24%">Product</th>
              <th>Description</th>
              <th style="width:9%">W″</th>
              <th style="width:9%">H″</th>
              <th style="width:7%">Qty</th>
              <th style="width:12%">Unit</th>
              <th style="width:12%">Total</th>
              <th></th>
            </tr></thead>
            <tbody>${(lines.length ? lines : [{}]).map((l, i) => lineRow(l, i)).join("")}</tbody>
          </table>
          <div class="form-actions"><button class="btn-primary" onclick="save()">Save line items</button></div>
        </div>

        <div class="panel">
          <h2>Notes for customer</h2>
          <textarea id="notes-c" rows="3" style="width:100%;padding:10px 12px;border:1px solid var(--c-line);font:inherit;font-size:.92rem">${SSAdmin.esc(estimate.notes_customer || '')}</textarea>
          <h2 style="margin-top:18px">Internal notes</h2>
          <textarea id="notes-i" rows="2" style="width:100%;padding:10px 12px;border:1px solid var(--c-line);font:inherit;font-size:.92rem">${SSAdmin.esc(estimate.notes_internal || '')}</textarea>
          <div class="form-actions"><button class="btn-secondary" onclick="saveNotes()">Save notes</button></div>
        </div>
      </div>

      <div>
        <div class="panel">
          <h2>Status</h2>
          <p><span class="status" data-s="${estimate.status}">${estimate.status}</span></p>
          <p class="muted" style="font-size:.85rem">Valid until <strong>${SSAdmin.esc(estimate.valid_until || '—')}</strong></p>
          ${estimate.sent_at ? `<p class="muted" style="font-size:.82rem">Sent ${SSAdmin.fmtDateTime(estimate.sent_at)}</p>` : ""}
          ${estimate.view_count ? `<p class="muted" style="font-size:.82rem">Viewed ${estimate.view_count}×, last ${SSAdmin.fmtDateTime(estimate.last_viewed_at)}</p>` : ""}
          ${estimate.approved_at ? `<p class="muted" style="font-size:.82rem;color:#3d6b3d">Approved by <strong>${SSAdmin.esc(estimate.approved_by_name)}</strong> on ${SSAdmin.fmtDateTime(estimate.approved_at)}</p>` : ""}

          <div class="totals">
            <div class="row"><span>Subtotal</span><span>${SSAdmin.fmtMoney(estimate.subtotal_cents)}</span></div>
            <div class="row"><span>Discount</span><span>${SSAdmin.fmtMoney(estimate.discount_cents || 0)}</span></div>
            <div class="row"><span>Tax</span><span>${SSAdmin.fmtMoney(estimate.tax_cents || 0)}</span></div>
            <div class="row grand"><span>Total</span><span>${SSAdmin.fmtMoney(estimate.total_cents)}</span></div>
          </div>

          <div class="form-actions" style="flex-direction:column;align-items:stretch">
            <button class="btn-primary" onclick="sendIt()">Send to customer</button>
            <a class="btn-secondary" href="${customerURL}" target="_blank">Preview customer view</a>
            <button class="btn-secondary" onclick="convertToContract()">Convert to contract</button>
            <button class="btn-danger" onclick="del()">Delete</button>
          </div>
        </div>

        <div class="panel">
          <h2>Settings</h2>
          <div class="form-grid">
            <label><span>Valid until</span><input id="valid-until" type="date" value="${estimate.valid_until || ''}"/></label>
            <div class="row">
              <label><span>Discount $</span><input id="discount" type="text" value="${((estimate.discount_cents || 0)/100).toFixed(2)}"/></label>
              <label><span>Tax $</span><input id="tax" type="text" value="${((estimate.tax_cents || 0)/100).toFixed(2)}"/></label>
            </div>
          </div>
          <div class="form-actions"><button class="btn-secondary" onclick="saveSettings()">Save</button></div>
        </div>
      </div>
    </div>
  `;
  // Wire up the product picker autocompute
  document.querySelectorAll("#lines select[data-f='product_id']").forEach((sel) => sel.onchange = onProductChange);
  document.querySelectorAll("#lines input[data-f]").forEach((inp) => inp.oninput = recalcRow);
}

function lineRow(l, i) {
  return `<tr data-idx="${i}">
    <td><input data-f="room" value="${SSAdmin.esc(l.room || '')}" placeholder="Living"/></td>
    <td>${productSelect(l.product_id)}</td>
    <td><input data-f="description" value="${SSAdmin.esc(l.description || '')}" placeholder="auto from product"/></td>
    <td><input class="num" data-f="width_in" type="number" step="0.125" value="${l.width_in ?? ''}"/></td>
    <td><input class="num" data-f="height_in" type="number" step="0.125" value="${l.height_in ?? ''}"/></td>
    <td><input class="num" data-f="quantity" type="number" step="1" value="${l.quantity ?? 1}"/></td>
    <td><input class="num" data-f="unit_dollars" type="text" value="${(((l.unit_price_cents||0)/100).toFixed(2))}"/></td>
    <td><input class="num" data-f="total_display" readonly value="${(((l.line_total_cents||0)/100).toFixed(2))}"/></td>
    <td><button class="lt-remove" onclick="this.closest('tr').remove();recalcRow.call(document.querySelector('#lines input'))" title="Remove">×</button></td>
  </tr>`;
}
function productSelect(selectedId) {
  const grouped = {};
  for (const p of products) (grouped[p.category] ||= []).push(p);
  return `<select data-f="product_id"><option value="">— pick —</option>${
    Object.entries(grouped).map(([cat, list]) => `<optgroup label="${SSAdmin.esc(cat)}">${
      list.map((p) => `<option value="${p.id}" data-base="${p.base_price_cents}" data-sqft="${p.price_per_sqft_cents}" ${selectedId == p.id ? "selected" : ""}>${SSAdmin.esc(p.name)}</option>`).join("")
    }</optgroup>`).join("")
  }</select>`;
}
function addLine() {
  const t = document.querySelector("#lines tbody");
  t.insertAdjacentHTML("beforeend", lineRow({}, t.children.length));
  const last = t.lastElementChild;
  last.querySelector("select[data-f='product_id']").onchange = onProductChange;
  last.querySelectorAll("input[data-f]").forEach((inp) => inp.oninput = recalcRow);
}
function onProductChange(e) {
  const row = e.target.closest("tr");
  const opt = e.target.selectedOptions[0];
  if (!opt || !opt.value) return;
  const base = parseInt(opt.dataset.base || 0, 10);
  const sqft = parseInt(opt.dataset.sqft || 0, 10);
  const w = parseFloat(row.querySelector("[data-f='width_in']").value) || 0;
  const h = parseFloat(row.querySelector("[data-f='height_in']").value) || 0;
  const unit = base + Math.round(sqft * (w * h / 144));
  row.querySelector("[data-f='unit_dollars']").value = (unit / 100).toFixed(2);
  row.querySelector("[data-f='description']").value ||= opt.textContent;
  recalcRow.call(row.querySelector("[data-f='quantity']"));
}
function recalcRow() {
  const row = this.closest("tr");
  const unit = SSAdmin.parseMoney(row.querySelector("[data-f='unit_dollars']").value);
  const qty = Number(row.querySelector("[data-f='quantity']").value || 1);
  const total = unit * qty;
  row.querySelector("[data-f='total_display']").value = (total / 100).toFixed(2);
}

async function save() {
  const lines = [...document.querySelectorAll("#lines tbody tr")].map((tr) => {
    const get = (f) => tr.querySelector(`[data-f='${f}']`)?.value || "";
    return {
      product_id: parseInt(get("product_id"), 10) || null,
      room: get("room") || null,
      description: get("description") || tr.querySelector("[data-f='product_id'] :checked")?.textContent || "",
      width_in: get("width_in") || null,
      height_in: get("height_in") || null,
      quantity: Number(get("quantity") || 1),
      unit_price_cents: SSAdmin.parseMoney(get("unit_dollars")),
    };
  }).filter((l) => l.description);
  try { await SSAdmin.fetchJSON("/api/estimates/" + id, { method: "PATCH", body: JSON.stringify({ lines }) }); SSAdmin.toast("Saved", "success"); render(); }
  catch (e) { SSAdmin.toast(e.message, "error"); }
}
async function saveNotes() {
  try { await SSAdmin.fetchJSON("/api/estimates/" + id, { method: "PATCH", body: JSON.stringify({
    notes_customer: document.getElementById("notes-c").value,
    notes_internal: document.getElementById("notes-i").value,
  })}); SSAdmin.toast("Notes saved", "success"); }
  catch (e) { SSAdmin.toast(e.message, "error"); }
}
async function saveSettings() {
  try { await SSAdmin.fetchJSON("/api/estimates/" + id, { method: "PATCH", body: JSON.stringify({
    valid_until: document.getElementById("valid-until").value || null,
    discount_cents: SSAdmin.parseMoney(document.getElementById("discount").value),
    tax_cents: SSAdmin.parseMoney(document.getElementById("tax").value),
  })}); SSAdmin.toast("Saved", "success"); render(); }
  catch (e) { SSAdmin.toast(e.message, "error"); }
}
async function sendIt() {
  if (!(await SSAdmin.confirmDialog("Email this estimate to the customer?"))) return;
  try { await SSAdmin.fetchJSON("/api/estimates/" + id + "/send", { method: "POST" }); SSAdmin.toast("Sent", "success"); render(); }
  catch (e) { SSAdmin.toast(e.message, "error"); }
}
async function convertToContract() {
  if (!(await SSAdmin.confirmDialog("Create a contract from this estimate?"))) return;
  const { estimate } = await SSAdmin.fetchJSON("/api/estimates/" + id);
  try {
    const { id: cid } = await SSAdmin.fetchJSON("/api/contracts", { method: "POST", body: JSON.stringify({ project_id: estimate.project_id, estimate_id: parseInt(id) }) });
    location.href = "/crm/contract.html?id=" + cid;
  } catch (e) { SSAdmin.toast(e.message, "error"); }
}
async function del() {
  if (!(await SSAdmin.confirmDialog("Delete this estimate? This cannot be undone."))) return;
  try { await SSAdmin.fetchJSON("/api/estimates/" + id, { method: "DELETE" }); location.href = "/crm/estimates.html"; }
  catch (e) { SSAdmin.toast(e.message, "error"); }
}
</script>
</body>
</html>
