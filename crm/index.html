<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads · Stately Shades CRM</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/crm/admin.css" />
  <link rel="icon" href="/assets/images/logo-v4.png" />
</head>
<body>
  <div class="admin">
    <aside class="admin__nav">
      <a href="/crm/" class="admin__brand">
        <span class="admin__brand-monogram" aria-hidden="true">S<span>S</span></span>
        <span class="admin__brand-text">
          <strong>Stately Shades</strong>
          <span>CRM</span>
        </span>
      </a>
      <div class="admin__nav-section">
        <span class="admin__nav-label">Pipeline</span>
        <div class="js-status-nav"></div>
      </div>
      <div class="admin__nav-user">
        <span><span data-user-email>—</span></span>
        <button onclick="SSAdmin.logout()">Sign out</button>
      </div>
    </aside>

    <main class="admin__main">
      <header class="admin__header">
        <h1 id="page-title"><em>Leads</em></h1>
        <div class="admin__search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="search" placeholder="Search name, email, phone, city…" autocomplete="off" />
        </div>
      </header>

      <div id="lead-table" class="lead-table">
        <div class="lead-table__empty">Loading…</div>
      </div>
    </main>
  </div>

  <script src="/crm/admin.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const status = params.get("status");
      const q = params.get("q") || "";

      // Render sidebar with status counts
      await SSAdmin.renderSidebar({ activeStatus: status });

      // Update title
      const title = document.getElementById("page-title");
      const label = status ? SSAdmin.STATUS_LABELS[status] : "Leads";
      title.innerHTML = status ? `<em>${SSAdmin.esc(label)}</em>` : `<em>Leads</em>`;

      // Wire search
      const searchInput = document.getElementById("search");
      searchInput.value = q;
      let timer;
      searchInput.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          const url = new URL(location.href);
          if (searchInput.value.trim()) url.searchParams.set("q", searchInput.value.trim());
          else url.searchParams.delete("q");
          location.href = url.toString();
        }, 350);
      });

      // Load and render leads
      const queryString = new URLSearchParams();
      if (status) queryString.set("status", status);
      if (q) queryString.set("q", q);
      const { leads } = await SSAdmin.fetchJSON("/api/leads?" + queryString.toString());

      const container = document.getElementById("lead-table");
      if (!leads || !leads.length) {
        container.innerHTML = `<div class="lead-table__empty">No leads ${q ? "match that search" : "yet"}.</div>`;
        return;
      }

      const rows = leads.map((l) => `
        <tr data-id="${l.id}" data-name="${SSAdmin.esc(l.name)}">
          <td onclick="location.href='/crm/lead.html?id=${l.id}'">
            <div class="lead-table__name">${SSAdmin.esc(l.name)}</div>
            <div class="lead-table__when">${SSAdmin.fmtDate(l.created_at)}</div>
          </td>
          <td onclick="location.href='/crm/lead.html?id=${l.id}'">
            <div>${l.email ? `<a href="mailto:${SSAdmin.esc(l.email)}" onclick="event.stopPropagation()">${SSAdmin.esc(l.email)}</a>` : ""}</div>
            <div class="lead-table__location">${l.phone ? `<a href="tel:${SSAdmin.esc(l.phone)}" onclick="event.stopPropagation()">${SSAdmin.esc(l.phone)}</a>` : ""}</div>
          </td>
          <td onclick="location.href='/crm/lead.html?id=${l.id}'"><div class="lead-table__interest">${SSAdmin.esc(l.interest || "—")}</div></td>
          <td onclick="location.href='/crm/lead.html?id=${l.id}'"><div class="lead-table__location">${SSAdmin.esc([l.address_city, l.address_state].filter(Boolean).join(", ") || l.location || "—")}</div></td>
          <td onclick="location.href='/crm/lead.html?id=${l.id}'">${SSAdmin.pill(l.status)}</td>
          <td class="lead-row-actions">
            <button class="lead-row-delete" title="Delete this lead" data-del="${l.id}" aria-label="Delete ${SSAdmin.esc(l.name)}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </td>
        </tr>
      `).join("");

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Contact</th>
              <th>Considering</th>
              <th>Location</th>
              <th>Status</th>
              <th style="width:48px"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      // Wire up the per-row delete buttons
      container.querySelectorAll(".lead-row-delete").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.dataset.del;
          const row = btn.closest("tr");
          const name = row.dataset.name;
          if (!confirm(`Delete lead "${name}"? This cannot be undone.`)) return;
          btn.disabled = true;
          try {
            const res = await fetch("/api/leads/" + id, { method: "DELETE", credentials: "same-origin" });
            if (!res.ok) throw new Error("Delete failed (HTTP " + res.status + ")");
            row.style.transition = "opacity .2s ease, transform .2s ease";
            row.style.opacity = "0";
            row.style.transform = "translateX(20px)";
            setTimeout(() => row.remove(), 220);
          } catch (err) {
            alert(err.message);
            btn.disabled = false;
          }
        });
      });
    })().catch((err) => {
      if (err.message !== "Unauthorized") {
        document.getElementById("lead-table").innerHTML = `<div class="lead-table__empty">Couldn't load leads: ${SSAdmin.esc(err.message)}</div>`;
      }
    });
  </script>
</body>
</html>
