<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job · Stately Shades CRM</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/crm/crm-app.css" />
  <link rel="icon" href="/assets/images/logo-v4.png" />
</head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
const id = parseInt(new URLSearchParams(location.search).get("id"), 10);
if (!id) location.href = "/crm/projects.html";

let state = null; // { project, windows, estimates, proposals, contracts }

(async () => {
  const user = await SSCrm.mount({
    title: "Job",
    actions: `<a class="btn ghost" href="/crm/projects.html">← All jobs</a>`,
    wide: true,
  });
  if (!user) return;
  await render();
})();

async function render() {
  state = await SSCrm.fetchJSON("/api/projects/" + id);
  const { project, windows, estimates, proposals, contracts } = state;
  document.title = `${project.name} · Stately Shades CRM`;

  // Find the "booked-the-job" state
  const fullyExecuted = contracts.find((c) => c.status === "fully_executed");
  const customerSigned = contracts.find((c) => c.status === "signed_by_customer");
  const acceptedProposal = proposals.find((p) => p.status === "accepted");
  const sentContract = contracts.find((c) => c.status === "sent");

  // What's the next best action? Drives the big CTA on the right.
  let bigCta = null;
  if (fullyExecuted) {
    bigCta = null; // Show celebration banner instead
  } else if (customerSigned) {
    bigCta = { label: "Counter-sign contract", href: `/crm/contract.html?id=${customerSigned.id}&action=countersign`, kind: "primary" };
  } else if (sentContract) {
    bigCta = { label: "Contract sent — awaiting signature", href: `/crm/contract.html?id=${sentContract.id}`, kind: "secondary" };
  } else if (acceptedProposal) {
    bigCta = { label: "Convert proposal → contract", action: `convertProposal(${acceptedProposal.id})`, kind: "primary" };
  } else if (proposals.length && proposals.some((p) => p.status === "tier_selected")) {
    const p = proposals.find((p) => p.status === "tier_selected");
    bigCta = { label: `Customer picked ${p.selected_tier} — request acceptance`, href: `/crm/proposal.html?id=${p.id}`, kind: "primary" };
  } else if (estimates.length || proposals.length) {
    bigCta = { label: "Send a contract", action: `newContract()`, kind: "secondary" };
  } else {
    bigCta = { label: "Start a proposal", action: `newProposal()`, kind: "primary" };
  }

  const initialTab = new URLSearchParams(location.hash.slice(1)).get("tab") || "overview";

  document.getElementById("page").innerHTML = `
    ${fullyExecuted ? `
      <div class="banner banner--success">
        <div class="banner__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="banner__body">
          <strong>Job booked.</strong>
          <span>Contract ${SSCrm.esc(fullyExecuted.number)} fully executed · ${SSCrm.fmtMoney(fullyExecuted.total_cents)}${fullyExecuted.deposit_paid ? " · Deposit received" : " · Deposit pending"}</span>
        </div>
      </div>` : ""}

    <div class="job">
      <header class="job__head">
        <div>
          <div class="job__title">${SSCrm.esc(project.name)}</div>
          <div class="job__customer">
            <a href="/crm/contact.html?id=${project.contact_id}">${SSCrm.esc(project.contact_name)}</a>
            · ${SSCrm.esc(project.contact_email)}
            ${project.contact_phone ? ` · ${SSCrm.esc(project.contact_phone)}` : ""}
            ${project.site_address ? ` · ${SSCrm.esc(project.site_address)}` : ""}
          </div>
        </div>
        <div class="job__status-actions">
          ${SSCrm.pill(project.status)}
          ${bigCta ? renderCta(bigCta) : ""}
        </div>
      </header>

      <nav class="job__tabs" id="tabs">
        ${tab("overview", "Overview")}
        ${tab("windows", "Windows", windows.length)}
        ${tab("proposals", "Proposals", proposals.length)}
        ${tab("contracts", "Contracts", contracts.length)}
        ${tab("activity", "Activity")}
      </nav>

      <div class="job__body" id="tab-body"></div>
    </div>
  `;

  switchTab(initialTab);
  document.querySelectorAll(".job__tab").forEach((t) => {
    t.addEventListener("click", () => switchTab(t.dataset.tab));
  });
}

function tab(key, label, count) {
  return `<button class="job__tab" data-tab="${key}">${SSCrm.esc(label)}${count != null ? `<span class="job__tab-count">${count}</span>` : ""}</button>`;
}

function renderCta(c) {
  const cls = c.kind === "primary" ? "primary" : "secondary";
  if (c.href) return `<a class="btn lg ${cls} job__big-cta" href="${c.href}">${SSCrm.esc(c.label)}</a>`;
  return `<button class="btn lg ${cls} job__big-cta" onclick="${c.action}">${SSCrm.esc(c.label)}</button>`;
}

function switchTab(tab) {
  document.querySelectorAll(".job__tab").forEach((t) => t.classList.toggle("is-active", t.dataset.tab === tab));
  location.hash = `tab=${tab}`;
  const body = document.getElementById("tab-body");
  const { project, windows, estimates, proposals, contracts } = state;

  if (tab === "overview") {
    // Compact Windows summary — Tave-style at-a-glance count + room breakdown
    const roomCounts = {};
    for (const w of windows) {
      const key = w.room || "(unassigned)";
      roomCounts[key] = (roomCounts[key] || 0) + 1;
    }
    const totalWindows = windows.length;
    const roomSummary = totalWindows
      ? Object.entries(roomCounts).map(([r, n]) => `<span style="display:inline-block;background:var(--bg-soft);padding:4px 10px;border-radius:999px;font-size:12px;margin:2px 4px 2px 0;color:var(--ink)">${SSCrm.esc(r)} <strong>${n}</strong></span>`).join("")
      : `<p class="muted" style="font-size:13px;margin:6px 0 0;font-style:italic">No windows tracked yet — measure them on the consultation visit and add them here.</p>`;

    body.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start">
        <div>
          <div class="card" style="margin-bottom:14px">
            <div class="card-head">
              <h3>Windows on this job</h3>
              <span style="font-size:28px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums">${totalWindows}</span>
            </div>
            <div style="margin-top:4px;line-height:1.8">${roomSummary}</div>
            <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn primary sm" onclick="switchTab('windows')">${totalWindows ? "Edit windows" : "+ Add windows"}</button>
              ${totalWindows ? `<button class="btn secondary sm" onclick="newProposalFromWindows()">+ Proposal from these windows</button>` : ""}
            </div>
          </div>

          <h3 style="font-size:14px;color:var(--ink-soft);margin-bottom:8px">Description</h3>
          <p style="color:var(--ink);font-size:14px;line-height:1.6">${SSCrm.esc(project.description || "No description.")}</p>
          <hr class="sep"/>
          <h3 style="font-size:14px;color:var(--ink-soft);margin-bottom:10px">Quick actions</h3>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            <button class="btn primary sm" onclick="newProposal()">+ Proposal</button>
            <button class="btn secondary sm" onclick="newContract()">+ Contract</button>
            <button class="btn ghost sm" onclick="switchTab('windows')">Edit windows</button>
          </div>
        </div>
        <div>
          <h3 style="font-size:14px;color:var(--ink-soft);margin-bottom:10px">Job details</h3>
          <div class="form">
            <label><span>Name</span><input id="p-name" value="${SSCrm.esc(project.name)}"/></label>
            <label><span>Status</span>
              <select id="p-status">
                ${SSCrm.PROJECT_STATUSES.map((s) => `<option value="${s.key}" ${s.key === project.status ? "selected" : ""}>${s.label}</option>`).join("")}
              </select>
            </label>
            <label><span>Site address</span><input id="p-addr" value="${SSCrm.esc(project.site_address || "")}"/></label>
            <label><span>Description</span><textarea id="p-desc" rows="3">${SSCrm.esc(project.description || "")}</textarea></label>
            <div class="form-actions"><button class="btn primary" onclick="saveProject()">Save</button></div>
          </div>
        </div>
      </div>
    `;
  }
  else if (tab === "windows") {
    body.innerHTML = renderWindowsTab(windows);
    wireWindows();
  }
  else if (tab === "proposals") body.innerHTML = renderDocTab(proposals, "proposal", "PROP", newProposal);
  else if (tab === "contracts") body.innerHTML = renderDocTab(contracts, "contract", "C", newContract);
  else if (tab === "activity") body.innerHTML = `<div id="activity-feed" class="muted">Loading…</div>`, loadActivity();
}

function renderDocTab(docs, kind, prefix, addFn) {
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="font-size:14px;color:var(--ink-soft)">${docs.length} ${kind}${docs.length === 1 ? "" : "s"}</h3>
      <button class="btn primary sm" onclick="${addFn.name}()">+ New ${kind}</button>
    </div>
    ${docs.length ? `<div class="tbl"><table>
      <thead><tr><th>${prefix}-#</th><th>Status</th><th class="num">Total</th><th>Activity</th><th></th></tr></thead>
      <tbody>${docs.map((d) => `
        <tr class="clickable" onclick="location.href='/crm/${kind}.html?id=${d.id}'">
          <td><strong>${SSCrm.esc(d.number || "")}</strong></td>
          <td>${SSCrm.pill(d.status)}</td>
          <td class="money">${SSCrm.fmtMoney(d.total_cents || d.selected_total_cents || 0)}</td>
          <td class="muted" style="font-size:12px">${SSCrm.fmtDate(d.updated_at || d.created_at)}</td>
          <td><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></td>
        </tr>`).join("")}
      </tbody></table></div>` : `<p class="muted" style="padding:30px;text-align:center">No ${kind}s yet.</p>`}
  `;
}

// ============================================================
// Windows tab — grouped by room with a top-down floor-plan SVG.
// Each window has a letter (A, B, C…) that appears both on the SVG and
// in the editor row, so an installer can match the worksheet to a wall.
// ============================================================
const WALLS = ["back", "left", "right", "front"];

let productCatalog = null;
async function ensureCatalog() {
  if (productCatalog) return productCatalog;
  const { products } = await SSCrm.fetchJSON("/api/products");
  productCatalog = products.filter((p) => p.active);
  return productCatalog;
}

function renderWindowsTab(ws) {
  const byRoom = {};
  const roomOrder = [];
  for (const w of ws) {
    const key = w.room || "(unassigned)";
    if (!byRoom[key]) { byRoom[key] = []; roomOrder.push(key); }
    byRoom[key].push(w);
  }
  setTimeout(populateProductSelects, 0);
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px" class="ws-toolbar">
      <div>
        <h3 style="font-size:14px;color:var(--ink-soft);margin:0">${ws.length} window${ws.length === 1 ? "" : "s"} across ${roomOrder.length} room${roomOrder.length === 1 ? "" : "s"}</h3>
        <p class="muted" style="font-size:12px;margin:4px 0 0">Each room is a top-down floor plan from the entry's perspective. Pick a wall and the window appears in the plan.</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn ghost sm" onclick="printWorksheet()">🖨 Print for installer</button>
        <button class="btn secondary sm" onclick="addWindow()">+ Window</button>
        <button class="btn primary sm" onclick="addRoom()">+ Room</button>
        <button class="btn primary sm" onclick="saveWindows()">Save</button>
      </div>
    </div>
    <div id="rooms-host" style="display:flex;flex-direction:column;gap:14px">
      ${roomOrder.length
        ? roomOrder.map((r) => roomCard(r, byRoom[r])).join("")
        : `<div class="card" style="text-align:center;padding:40px;color:var(--ink-soft);font-size:14px">No windows tracked yet — click <strong>+ Room</strong> to start.</div>`}
    </div>
  `;
}

function roomCard(roomName, windows) {
  return `<div class="card room-card" data-room="${SSCrm.esc(roomName)}">
    <div class="card-head" style="display:flex;align-items:center;gap:10px">
      <input class="room-name" value="${SSCrm.esc(roomName === "(unassigned)" ? "" : roomName)}" placeholder="Room name (Living, Primary BR…)"
             style="flex:1;border:0;padding:6px 0;font-size:18px;font-weight:600;background:transparent;color:var(--ink);min-width:0"/>
      <span class="room-count muted" style="font-size:12px">${windows.length} window${windows.length === 1 ? "" : "s"}</span>
      <button class="btn ghost sm" onclick="addWindowToRoom(this)">+ Window here</button>
      <button class="btn ghost sm" onclick="removeRoom(this)" style="color:var(--danger)" title="Remove room (and its windows)">Remove</button>
    </div>
    <div style="display:grid;grid-template-columns:340px minmax(0,1fr);gap:20px;align-items:start;margin-top:12px" class="room-body">
      <div class="room-floorplan">${floorplanSvg(windows)}</div>
      <div class="room-windows" style="overflow-x:auto">
        <table class="lines" style="min-width:580px"><thead><tr>
          <th style="width:32px">#</th>
          <th>Label</th>
          <th style="width:90px">Wall</th>
          <th class="num" style="width:58px">W″</th>
          <th class="num" style="width:58px">H″</th>
          <th style="width:78px">Mount</th>
          <th>Product</th>
          <th style="width:100px">Color</th>
          <th>Notes</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody class="room-window-rows">
          ${windows.map((w, i) => winRow(w, i)).join("") || winRow({}, 0)}
        </tbody></table>
      </div>
    </div>
  </div>`;
}

// Top-down floor plan SVG, viewer at the entry (bottom of the square)
function floorplanSvg(windows) {
  const VB = 320, M = 30;
  const RX = M, RY = M, RW = VB - M*2, RH = VB - M*2;
  const buckets = { back: [], left: [], right: [], front: [], "(none)": [] };
  windows.forEach((w, i) => {
    const wall = WALLS.includes(w.wall) ? w.wall : "(none)";
    buckets[wall].push({ w, idx: i, letter: String.fromCharCode(65 + i) });
  });
  const rects = [];
  for (const wall of WALLS) {
    const list = buckets[wall];
    if (!list.length) continue;
    const n = list.length;
    list.forEach((e, j) => {
      const t = (j + 0.5) / n;
      const WSZ = 38, WT = 9;
      let x, y, ww, wh;
      if (wall === "back")  { x = RX + t * RW - WSZ/2; y = RY - WT/2;             ww = WSZ; wh = WT; }
      if (wall === "front") { x = RX + t * RW - WSZ/2; y = RY + RH - WT/2;        ww = WSZ; wh = WT; }
      if (wall === "left")  { x = RX - WT/2;            y = RY + t * RH - WSZ/2;  ww = WT;  wh = WSZ; }
      if (wall === "right") { x = RX + RW - WT/2;       y = RY + t * RH - WSZ/2;  ww = WT;  wh = WSZ; }
      const cx = x + ww/2, cy = y + wh/2;
      rects.push(`
        <rect x="${x}" y="${y}" width="${ww}" height="${wh}" rx="2" fill="#3B82F6" stroke="#1E40AF" stroke-width="1" data-idx="${e.idx}" style="cursor:pointer"/>
        <text x="${cx}" y="${cy + 3}" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" pointer-events="none">${e.letter}</text>
      `);
    });
  }
  const unassigned = buckets["(none)"].length;
  return `
    <svg viewBox="0 0 ${VB} ${VB}" style="width:100%;max-width:340px;height:auto;background:#F8FAFC;border:1px solid var(--line);border-radius:var(--r);display:block">
      <rect x="${RX}" y="${RY}" width="${RW}" height="${RH}" fill="#FFFFFF" stroke="#0F172A" stroke-width="2.5"/>
      <text x="${VB/2}" y="${RY - 10}" text-anchor="middle" font-size="11" fill="#64748B" font-weight="600" letter-spacing="0.05em">BACK</text>
      <text x="${RX - 6}" y="${VB/2}" text-anchor="middle" font-size="11" fill="#64748B" font-weight="600" letter-spacing="0.05em" transform="rotate(-90 ${RX - 6} ${VB/2})">LEFT</text>
      <text x="${RX + RW + 6}" y="${VB/2}" text-anchor="middle" font-size="11" fill="#64748B" font-weight="600" letter-spacing="0.05em" transform="rotate(90 ${RX + RW + 6} ${VB/2})">RIGHT</text>
      <text x="${VB/2}" y="${RY + RH + 16}" text-anchor="middle" font-size="11" fill="#64748B" font-weight="600" letter-spacing="0.05em">FRONT (near entry)</text>
      ${rects.join("")}
      <g transform="translate(${VB/2}, ${RY + RH + 4})">
        <path d="M 0 14 L -6 22 L 6 22 Z" fill="#0F172A"/>
        <text x="0" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="#0F172A">ENTRY</text>
      </g>
    </svg>
    ${unassigned ? `<p class="muted" style="font-size:11px;margin:6px 0 0">${unassigned} window${unassigned === 1 ? " has" : "s have"} no wall yet — pick one to place ${unassigned === 1 ? "it" : "them"} on the plan.</p>` : ""}
  `;
}

// Render a clean installer worksheet in a new window with its own print stylesheet
function printWorksheet() {
  const { project, windows } = state;
  if (!windows.length) { SSCrm.toast("No windows to print yet", "error"); return; }
  // Try to pull product names from the catalog (if a window has product_id)
  const w = window.open("", "_blank");
  const addr = project.site_address || "";
  const phone = project.contact_phone || "";
  const today = new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
  const rows = windows.map((r, i) => `
    <tr>
      <td class="n">${i + 1}</td>
      <td><strong>${SSCrm.esc(r.room || "")}</strong>${r.label ? `<div class="sub">${SSCrm.esc(r.label)}</div>` : ""}</td>
      <td class="num">${r.width_in ?? "—"}″</td>
      <td class="num">${r.height_in ?? "—"}″</td>
      <td>${SSCrm.esc(r.mount || "—")}</td>
      <td class="num">${r.depth_in ?? "—"}″</td>
      <td>${SSCrm.esc(r.product_name || (r.product_id ? "#" + r.product_id : ""))}</td>
      <td>${SSCrm.esc(r.color || "")}</td>
      <td>${SSCrm.esc(r.notes || "")}</td>
      <td class="check"></td>
    </tr>
  `).join("");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <title>Installer Worksheet — ${SSCrm.esc(project.name)}</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #000; padding: 24px; font-size: 12px; line-height: 1.4; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .meta { color: #444; font-size: 12px; margin-bottom: 18px; }
      .meta strong { color: #000; }
      .meta-row { display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 4px; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { background: #f1f1f1; text-align: left; padding: 8px 6px; border: 1px solid #999; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
      td { padding: 10px 6px; border: 1px solid #bbb; vertical-align: top; }
      td.n { text-align: center; font-weight: 700; background: #f7f7f7; width: 36px; }
      td.num { text-align: right; font-variant-numeric: tabular-nums; }
      td.check { width: 30px; }
      .sub { color: #555; font-size: 11px; margin-top: 2px; }
      .signoff { margin-top: 26px; display: flex; gap: 30px; justify-content: space-between; }
      .signoff div { flex: 1; }
      .signoff label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; margin-bottom: 18px; }
      .signoff hr { border: 0; border-top: 1px solid #000; margin: 0; }
      @media print {
        body { padding: 12mm; }
        button { display: none; }
        .print-actions { display: none; }
      }
    </style></head><body>
    <div class="print-actions" style="text-align:right;margin-bottom:14px">
      <button onclick="window.print()" style="padding:8px 16px;cursor:pointer">Print</button>
    </div>
    <h1>${SSCrm.esc(project.name)} — Installer Worksheet</h1>
    <div class="meta">
      <div class="meta-row"><span><strong>Customer:</strong> ${SSCrm.esc(project.contact_name)}</span><span><strong>Phone:</strong> ${SSCrm.esc(phone)}</span></div>
      <div class="meta-row"><span><strong>Site:</strong> ${SSCrm.esc(addr)}</span><span><strong>Date:</strong> ${today}</span></div>
      <div class="meta-row"><span><strong>${windows.length} window${windows.length === 1 ? "" : "s"}</strong></span></div>
    </div>
    <table>
      <thead><tr>
        <th>#</th><th>Room / Label</th><th>W</th><th>H</th><th>Mount</th><th>Depth</th><th>Product</th><th>Color / Finish</th><th>Notes</th><th>✓</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="signoff">
      <div><label>Installer signature</label><hr/></div>
      <div><label>Customer sign-off on completion</label><hr/></div>
      <div><label>Date</label><hr/></div>
    </div>
  </body></html>`);
  w.document.close();
}

function winRow(w, i) {
  const letter = String.fromCharCode(65 + (i % 26));
  return `<tr data-idx="${i}">
    <td style="text-align:center;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);font-size:13px">${letter}</td>
    <td><input data-f="label" value="${SSCrm.esc(w.label || "")}" placeholder="North, Bay-left…"/></td>
    <td>
      <select data-f="wall" onchange="redrawCardFromInput(this)">
        <option value="">—</option>
        <option value="back"  ${w.wall === "back"  ? "selected" : ""}>Back</option>
        <option value="left"  ${w.wall === "left"  ? "selected" : ""}>Left</option>
        <option value="right" ${w.wall === "right" ? "selected" : ""}>Right</option>
        <option value="front" ${w.wall === "front" ? "selected" : ""}>Front</option>
      </select>
    </td>
    <td><input class="num" data-f="width_in" value="${w.width_in ?? ""}" type="number" step="0.125"/></td>
    <td><input class="num" data-f="height_in" value="${w.height_in ?? ""}" type="number" step="0.125"/></td>
    <td><select data-f="mount"><option value="">—</option><option ${w.mount === "inside" ? "selected" : ""}>inside</option><option ${w.mount === "outside" ? "selected" : ""}>outside</option></select></td>
    <td><select data-f="product_id" class="js-prod">${prodOptions(w.product_id)}</select></td>
    <td><input data-f="color" value="${SSCrm.esc(w.color || "")}" placeholder="White, walnut…"/></td>
    <td><input data-f="notes" value="${SSCrm.esc(w.notes || "")}"/></td>
    <td><button class="rm" onclick="removeWinRow(this)" title="Remove">×</button></td>
  </tr>`;
}

function prodOptions(selectedId) {
  if (!productCatalog) return `<option value="">— —</option>`;
  return `<option value="">— Product —</option>` + productCatalog.map((p) => `<option value="${p.id}" ${selectedId == p.id ? "selected" : ""}>${SSCrm.esc(p.name)}</option>`).join("");
}
async function populateProductSelects() {
  await ensureCatalog();
  document.querySelectorAll("select.js-prod").forEach((sel) => {
    const cur = sel.value;
    sel.innerHTML = prodOptions(cur);
    if (cur) sel.value = cur;
  });
}

function wireWindows() {}

function redrawCardFromInput(el) { refreshCard(el.closest(".room-card")); }
function removeWinRow(btn) { const card = btn.closest(".room-card"); btn.closest("tr").remove(); refreshCard(card); }
function removeRoom(btn) {
  if (!confirm("Remove this room and all its windows?")) return;
  btn.closest(".room-card").remove();
}

function refreshCard(card) {
  if (!card) return;
  const rows = [...card.querySelectorAll(".room-window-rows tr")];
  rows.forEach((tr, i) => {
    tr.querySelector("td:first-child").textContent = String.fromCharCode(65 + (i % 26));
    tr.dataset.idx = i;
  });
  const windows = rows.map(collectRowData);
  card.querySelector(".room-floorplan").innerHTML = floorplanSvg(windows);
  card.querySelector(".room-count").textContent = `${rows.length} window${rows.length === 1 ? "" : "s"}`;
}
function collectRowData(tr) {
  const v = (f) => tr.querySelector(`[data-f="${f}"]`)?.value || "";
  return {
    label: v("label"),
    wall:  v("wall") || null,
    width_in:  v("width_in") !== ""  ? Number(v("width_in"))  : null,
    height_in: v("height_in") !== "" ? Number(v("height_in")) : null,
    mount: v("mount") || null,
    product_id: v("product_id") ? parseInt(v("product_id"), 10) : null,
    color: v("color") || null,
    notes: v("notes") || null,
  };
}

async function addRoom() {
  const name = prompt("Room name?  (Living, Primary BR, Kitchen…)");
  if (!name) return;
  const cntStr = prompt(`How many windows in ${name}?`, "1");
  const count = Math.max(1, Math.min(20, parseInt(cntStr || "1", 10) || 1));
  await ensureCatalog();
  const host = document.getElementById("rooms-host");
  // Clear the empty-state card if it's there
  if (host.querySelector(".card") && !host.querySelector(".room-card")) host.innerHTML = "";
  const windows = Array.from({ length: count }, () => ({ room: name }));
  host.insertAdjacentHTML("beforeend", roomCard(name, windows));
  populateProductSelects();
  const newCard = host.lastElementChild;
  newCard.scrollIntoView({ behavior: "smooth", block: "start" });
  refreshCard(newCard);
}
async function addWindow() {
  await ensureCatalog();
  let card = document.querySelector('.room-card[data-room="(unassigned)"]');
  if (!card) {
    const host = document.getElementById("rooms-host");
    if (host.querySelector(".card") && !host.querySelector(".room-card")) host.innerHTML = "";
    host.insertAdjacentHTML("beforeend", roomCard("(unassigned)", [{}]));
    populateProductSelects();
    return;
  }
  card.querySelector(".room-window-rows").insertAdjacentHTML("beforeend", winRow({}, card.querySelectorAll(".room-window-rows tr").length));
  populateProductSelects();
  refreshCard(card);
}
async function addWindowToRoom(btn) {
  await ensureCatalog();
  const card = btn.closest(".room-card");
  card.querySelector(".room-window-rows").insertAdjacentHTML("beforeend", winRow({}, card.querySelectorAll(".room-window-rows tr").length));
  populateProductSelects();
  refreshCard(card);
}
async function saveWindows() {
  const out = [];
  document.querySelectorAll(".room-card").forEach((card) => {
    const room = card.querySelector(".room-name").value.trim();
    card.querySelectorAll(".room-window-rows tr").forEach((tr) => {
      const data = collectRowData(tr);
      if (!room && !data.label && data.width_in == null && data.height_in == null) return;
      out.push({ ...data, room: room || "(unassigned)" });
    });
  });
  try {
    await SSCrm.fetchJSON(`/api/projects/${id}/windows`, { method: "PUT", body: JSON.stringify({ windows: out }) });
    SSCrm.toast(`Saved ${out.length} window${out.length === 1 ? "" : "s"}`, "success");
    state = await SSCrm.fetchJSON("/api/projects/" + id);
    // Rerender the tab so freshly-saved rows pick up DB ids + redraw
    switchTab("windows");
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function saveProject() {
  try {
    await SSCrm.fetchJSON("/api/projects/" + id, { method: "PATCH", body: JSON.stringify({
      name: document.getElementById("p-name").value.trim(),
      status: document.getElementById("p-status").value,
      site_address: document.getElementById("p-addr").value.trim(),
      description: document.getElementById("p-desc").value.trim(),
    })});
    SSCrm.toast("Saved", "success");
    await render();
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function loadActivity() {
  try {
    const { activity } = await SSCrm.fetchJSON(`/api/activity?entity_type=project&entity_id=${id}&limit=80`);
    const feed = document.getElementById("activity-feed");
    if (!activity.length) { feed.innerHTML = `<p style="text-align:center;color:var(--ink-soft);padding:40px">No activity yet.</p>`; return; }
    feed.innerHTML = `<ul class="activity">${activity.map((a) => `
      <li>
        <span class="activity__icon" data-k="${SSCrm.esc(a.action)}">·</span>
        <div class="activity__body">
          <strong>${SSCrm.esc(a.action.replace(/-/g, " "))}</strong>
          ${a.actor_name ? `· by ${SSCrm.esc(a.actor_name)}` : ""}
          <div class="activity__time">${SSCrm.fmtDateTime(a.created_at)}</div>
        </div>
      </li>`).join("")}</ul>`;
  } catch (e) { document.getElementById("activity-feed").innerHTML = `<p class="muted">${SSCrm.esc(e.message)}</p>`; }
}

async function newEstimate() {
  try { const { id: nid } = await SSCrm.fetchJSON("/api/estimates", { method: "POST", body: JSON.stringify({ project_id: id }) }); location.href = "/crm/estimate.html?id=" + nid; }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
// Start a proposal AND signal to the proposal builder that the project's
// windows should be pre-loaded as lines (handled via ?seed=windows).
async function newProposalFromWindows() {
  try {
    const { id: nid } = await SSCrm.fetchJSON("/api/proposals", { method: "POST", body: JSON.stringify({ project_id: id }) });
    location.href = `/crm/proposal.html?id=${nid}&seed=windows`;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}
async function newProposal() {
  try { const { id: nid } = await SSCrm.fetchJSON("/api/proposals", { method: "POST", body: JSON.stringify({ project_id: id }) }); location.href = "/crm/proposal.html?id=" + nid; }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
async function newContract() {
  // Ask which contract type
  const type = await pickContractType();
  if (!type) return;
  try {
    const { id: nid } = await SSCrm.fetchJSON("/api/contracts", { method: "POST", body: JSON.stringify({ project_id: id, contract_type: type }) });
    location.href = "/crm/contract.html?id=" + nid;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

function pickContractType() {
  return new Promise((resolve) => {
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    bg.innerHTML = `
      <div class="modal" style="max-width:520px">
        <div class="modal-head">What kind of contract?</div>
        <div class="modal-body" style="display:grid;gap:10px">
          <button class="btn secondary" data-t="custom_order" style="justify-content:flex-start;padding:14px;text-align:left;flex-direction:column;align-items:flex-start;gap:4px">
            <strong style="font-size:14px">Custom Order</strong>
            <span style="font-size:12px;color:var(--ink-soft);font-weight:400">We supply &amp; install custom-made treatments. 50% deposit. Manufacturer warranty + 90-day workmanship.</span>
          </button>
          <button class="btn secondary" data-t="install_only" style="justify-content:flex-start;padding:14px;text-align:left;flex-direction:column;align-items:flex-start;gap:4px">
            <strong style="font-size:14px">Install Only · BYO Blinds</strong>
            <span style="font-size:12px;color:var(--ink-soft);font-weight:400">Customer supplies blinds (Lowes, Home Depot, Costco, etc.). We install them. No deposit. Pay on completion. 90-day workmanship.</span>
          </button>
          <button class="btn secondary" data-t="repair" style="justify-content:flex-start;padding:14px;text-align:left;flex-direction:column;align-items:flex-start;gap:4px">
            <strong style="font-size:14px">Repair / Service Call</strong>
            <span style="font-size:12px;color:var(--ink-soft);font-weight:400">Repair an existing blind, shutter, or shade. Service-call fee + parts. Pay on completion. 90-day workmanship.</span>
          </button>
        </div>
        <div class="modal-foot"><button class="btn ghost" data-no>Cancel</button></div>
      </div>
    `;
    document.body.appendChild(bg);
    bg.querySelectorAll("[data-t]").forEach((b) => { b.onclick = () => { bg.remove(); resolve(b.dataset.t); }; });
    bg.querySelector("[data-no]").onclick = () => { bg.remove(); resolve(null); };
    bg.addEventListener("click", (e) => { if (e.target === bg) { bg.remove(); resolve(null); } });
  });
}
async function convertProposal(propId) {
  if (!(await SSCrm.confirmDialog("Create a contract from the accepted tier of this proposal?"))) return;
  try {
    const { id: nid } = await SSCrm.fetchJSON(`/api/proposals/${propId}/convert`, { method: "POST" });
    SSCrm.toast("Contract drafted from proposal", "success");
    location.href = "/crm/contract.html?id=" + nid;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}
</script>
