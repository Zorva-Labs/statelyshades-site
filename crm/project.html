<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job · Stately Shades CRM</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/crm/crm-app.css" />
  <link rel="icon" href="/assets/images/logo-v4.png" />
</head>
<body>
<script src="/crm/crm-app.js"></script>
<script src="/crm/windows-editor.js"></script>
<script>
const id = parseInt(new URLSearchParams(location.search).get("id"), 10);
if (!id) location.href = "/crm/projects.html";

let state = null; // { project, windows, estimates, proposals, contracts }

(async () => {
  const user = await SSCrm.mount({
    title: "Job",
    actions: `<a class="btn ghost" href="/crm/projects.html">← All jobs</a>`,
    wide: true,
  });
  if (!user) return;
  await render();
})();

async function render() {
  state = await SSCrm.fetchJSON("/api/projects/" + id);
  const { project, windows, estimates, proposals, contracts } = state;
  document.title = `${project.name} · Stately Shades CRM`;

  // Find the "booked-the-job" state
  const fullyExecuted = contracts.find((c) => c.status === "fully_executed");
  const customerSigned = contracts.find((c) => c.status === "signed_by_customer");
  const acceptedProposal = proposals.find((p) => p.status === "accepted");
  const sentContract = contracts.find((c) => c.status === "sent");

  // What's the next best action? Drives the big CTA on the right.
  let bigCta = null;
  if (fullyExecuted) {
    bigCta = null; // Show celebration banner instead
  } else if (customerSigned) {
    bigCta = { label: "Counter-sign contract", href: `/crm/contract.html?id=${customerSigned.id}&action=countersign`, kind: "primary" };
  } else if (sentContract) {
    bigCta = { label: "Contract sent — awaiting signature", href: `/crm/contract.html?id=${sentContract.id}`, kind: "secondary" };
  } else if (acceptedProposal) {
    bigCta = { label: "Convert proposal → contract", action: `convertProposal(${acceptedProposal.id})`, kind: "primary" };
  } else if (proposals.length && proposals.some((p) => p.status === "tier_selected")) {
    const p = proposals.find((p) => p.status === "tier_selected");
    bigCta = { label: `Customer picked ${p.selected_tier} — request acceptance`, href: `/crm/proposal.html?id=${p.id}`, kind: "primary" };
  } else if (estimates.length || proposals.length) {
    bigCta = { label: "Send a contract", action: `newContract()`, kind: "secondary" };
  } else {
    bigCta = { label: "Start a proposal", action: `newProposal()`, kind: "primary" };
  }

  const initialTab = new URLSearchParams(location.hash.slice(1)).get("tab") || "overview";

  document.getElementById("page").innerHTML = `
    ${fullyExecuted ? `
      <div class="banner banner--success">
        <div class="banner__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="banner__body">
          <strong>Job booked.</strong>
          <span>Contract ${SSCrm.esc(fullyExecuted.number)} fully executed · ${SSCrm.fmtMoney(fullyExecuted.total_cents)}${fullyExecuted.deposit_paid ? " · Deposit received" : " · Deposit pending"}</span>
        </div>
      </div>` : ""}

    <div class="job">
      <header class="job__head">
        <div>
          <div class="job__title">${SSCrm.esc(project.name)}</div>
          <div class="job__customer">
            <a href="/crm/contact.html?id=${project.contact_id}">${SSCrm.esc(project.contact_name)}</a>
            · ${SSCrm.esc(project.contact_email)}
            ${project.contact_phone ? ` · ${SSCrm.esc(project.contact_phone)}` : ""}
            ${project.site_address ? ` · ${SSCrm.esc(project.site_address)}` : ""}
          </div>
        </div>
        <div class="job__status-actions">
          ${SSCrm.pill(project.status)}
          ${bigCta ? renderCta(bigCta) : ""}
        </div>
      </header>

      <nav class="job__tabs" id="tabs">
        ${tab("overview", "Overview")}
        ${tab("windows", "Windows", windows.length)}
        ${tab("proposals", "Proposals", proposals.length)}
        ${tab("contracts", "Contracts", contracts.length)}
        ${tab("activity", "Activity")}
      </nav>

      <div class="job__body" id="tab-body"></div>
    </div>
  `;

  switchTab(initialTab);
  document.querySelectorAll(".job__tab").forEach((t) => {
    t.addEventListener("click", () => switchTab(t.dataset.tab));
  });
}

function tab(key, label, count) {
  return `<button class="job__tab" data-tab="${key}">${SSCrm.esc(label)}${count != null ? `<span class="job__tab-count">${count}</span>` : ""}</button>`;
}

function renderCta(c) {
  const cls = c.kind === "primary" ? "primary" : "secondary";
  if (c.href) return `<a class="btn lg ${cls} job__big-cta" href="${c.href}">${SSCrm.esc(c.label)}</a>`;
  return `<button class="btn lg ${cls} job__big-cta" onclick="${c.action}">${SSCrm.esc(c.label)}</button>`;
}

function switchTab(tab) {
  document.querySelectorAll(".job__tab").forEach((t) => t.classList.toggle("is-active", t.dataset.tab === tab));
  location.hash = `tab=${tab}`;
  const body = document.getElementById("tab-body");
  const { project, windows, estimates, proposals, contracts } = state;

  if (tab === "overview") {
    // Compact Windows summary — Tave-style at-a-glance count + room breakdown
    const roomCounts = {};
    for (const w of windows) {
      const key = w.room || "(unassigned)";
      roomCounts[key] = (roomCounts[key] || 0) + 1;
    }
    const totalWindows = windows.length;
    const roomSummary = totalWindows
      ? Object.entries(roomCounts).map(([r, n]) => `<span style="display:inline-block;background:var(--bg-soft);padding:4px 10px;border-radius:999px;font-size:12px;margin:2px 4px 2px 0;color:var(--ink)">${SSCrm.esc(r)} <strong>${n}</strong></span>`).join("")
      : `<p class="muted" style="font-size:13px;margin:6px 0 0;font-style:italic">No windows tracked yet — measure them on the consultation visit and add them here.</p>`;

    // Single-column stack: Windows summary + Description + Quick actions + Job details — all full width.
    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:14px;align-items:stretch">
        <div class="card">
          <div class="card-head">
            <h3>Windows on this job</h3>
            <span style="font-size:28px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums">${totalWindows}</span>
          </div>
          <div style="margin-top:4px;line-height:1.8">${roomSummary}</div>
          <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn primary sm" onclick="switchTab('windows')">${totalWindows ? "Edit windows" : "+ Add windows"}</button>
            ${totalWindows ? `<button class="btn secondary sm" onclick="newProposalFromWindows()">+ Proposal from these windows</button>` : ""}
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h3>Quick actions</h3></div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            <button class="btn primary sm" onclick="newProposal()">+ Proposal</button>
            <button class="btn secondary sm" onclick="newContract()">+ Contract</button>
            <button class="btn ghost sm" onclick="switchTab('windows')">Edit windows</button>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h3>Job details</h3></div>
          <div class="form">
            <label><span>Name</span><input id="p-name" value="${SSCrm.esc(project.name)}"/></label>
            <label><span>Status</span>
              <select id="p-status">
                ${SSCrm.PROJECT_STATUSES.map((s) => `<option value="${s.key}" ${s.key === project.status ? "selected" : ""}>${s.label}</option>`).join("")}
              </select>
            </label>
            <label><span>Site address</span><input id="p-addr" value="${SSCrm.esc(project.site_address || "")}"/></label>
            <label><span>Description</span><textarea id="p-desc" rows="3">${SSCrm.esc(project.description || "")}</textarea></label>
            <div class="form-actions"><button class="btn primary" onclick="saveProject()">Save</button></div>
          </div>
        </div>
      </div>
    `;
  }
  else if (tab === "windows") {
    body.innerHTML = renderWindowsTab(windows);
    // Wire the shared editor into the host div that renderWindowsTab created
    ensureCatalog().then((cat) => {
      const host = document.getElementById("rooms-host");
      WindowsEditor.init(host, windows, { catalog: cat });
    });
  }
  else if (tab === "proposals") body.innerHTML = renderDocTab(proposals, "proposal", "PROP", newProposal);
  else if (tab === "contracts") body.innerHTML = renderDocTab(contracts, "contract", "C", newContract);
  else if (tab === "activity") body.innerHTML = `<div id="activity-feed" class="muted">Loading…</div>`, loadActivity();
}

function renderDocTab(docs, kind, prefix, addFn) {
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="font-size:14px;color:var(--ink-soft)">${docs.length} ${kind}${docs.length === 1 ? "" : "s"}</h3>
      <button class="btn primary sm" onclick="${addFn.name}()">+ New ${kind}</button>
    </div>
    ${docs.length ? `<div class="tbl"><table>
      <thead><tr><th>${prefix}-#</th><th>Status</th><th class="num">Total</th><th>Activity</th><th></th></tr></thead>
      <tbody>${docs.map((d) => `
        <tr class="clickable" onclick="location.href='/crm/${kind}.html?id=${d.id}'">
          <td><strong>${SSCrm.esc(d.number || "")}</strong></td>
          <td>${SSCrm.pill(d.status)}</td>
          <td class="money">${SSCrm.fmtMoney(d.total_cents || d.selected_total_cents || 0)}</td>
          <td class="muted" style="font-size:12px">${SSCrm.fmtDate(d.updated_at || d.created_at)}</td>
          <td><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></td>
        </tr>`).join("")}
      </tbody></table></div>` : `<p class="muted" style="padding:30px;text-align:center">No ${kind}s yet.</p>`}
  `;
}

// ============================================================
// Windows tab — uses the shared /crm/windows-editor.js (WindowsEditor module).
// Convention: clockwise from back-left. Each window letter (A, B, C…)
// matches a position on the top-down floor-plan SVG.
// ============================================================
let productCatalog = null;
async function ensureCatalog() {
  if (productCatalog) return productCatalog;
  const { products } = await SSCrm.fetchJSON("/api/products");
  productCatalog = products.filter((p) => p.active);
  return productCatalog;
}

function renderWindowsTab(ws) {
  const roomCount = new Set(ws.map((w) => w.room || "(unassigned)")).size;
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px" class="ws-toolbar">
      <div>
        <h3 style="font-size:14px;color:var(--ink-soft);margin:0">${ws.length} window${ws.length === 1 ? "" : "s"} across ${roomCount} room${roomCount === 1 ? "" : "s"}</h3>
        <p class="muted" style="font-size:12px;margin:4px 0 0">Clockwise from the back-left corner — pick a wall and the window appears in the plan.</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn ghost sm" onclick="printWorksheet()">🖨 Print for installer</button>
        <button class="btn secondary sm" onclick="WindowsEditor.addWindow()">+ Window</button>
        <button class="btn primary sm" onclick="WindowsEditor.addRoom()">+ Room</button>
        <button class="btn primary sm" onclick="saveWindows()">Save</button>
      </div>
    </div>
    <div id="rooms-host" style="display:flex;flex-direction:column;gap:14px"></div>
  `;
}

async function saveWindows() {
  const out = WindowsEditor.collect();
  try {
    await SSCrm.fetchJSON(`/api/projects/${id}/windows`, { method: "PUT", body: JSON.stringify({ windows: out }) });
    SSCrm.toast(`Saved ${out.length} window${out.length === 1 ? "" : "s"}`, "success");
    state = await SSCrm.fetchJSON("/api/projects/" + id);
    // Rerender the tab so freshly-saved rows pick up DB ids + redraw clockwise
    switchTab("windows");
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function saveProject() {
  try {
    await SSCrm.fetchJSON("/api/projects/" + id, { method: "PATCH", body: JSON.stringify({
      name: document.getElementById("p-name").value.trim(),
      status: document.getElementById("p-status").value,
      site_address: document.getElementById("p-addr").value.trim(),
      description: document.getElementById("p-desc").value.trim(),
    })});
    SSCrm.toast("Saved", "success");
    await render();
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function loadActivity() {
  try {
    const { activity } = await SSCrm.fetchJSON(`/api/activity?entity_type=project&entity_id=${id}&limit=80`);
    const feed = document.getElementById("activity-feed");
    if (!activity.length) { feed.innerHTML = `<p style="text-align:center;color:var(--ink-soft);padding:40px">No activity yet.</p>`; return; }
    feed.innerHTML = `<ul class="activity">${activity.map((a) => `
      <li>
        <span class="activity__icon" data-k="${SSCrm.esc(a.action)}">·</span>
        <div class="activity__body">
          <strong>${SSCrm.esc(a.action.replace(/-/g, " "))}</strong>
          ${a.actor_name ? `· by ${SSCrm.esc(a.actor_name)}` : ""}
          <div class="activity__time">${SSCrm.fmtDateTime(a.created_at)}</div>
        </div>
      </li>`).join("")}</ul>`;
  } catch (e) { document.getElementById("activity-feed").innerHTML = `<p class="muted">${SSCrm.esc(e.message)}</p>`; }
}

async function newEstimate() {
  try { const { id: nid } = await SSCrm.fetchJSON("/api/estimates", { method: "POST", body: JSON.stringify({ project_id: id }) }); location.href = "/crm/estimate.html?id=" + nid; }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
// Start a proposal AND signal to the proposal builder that the project's
// windows should be pre-loaded as lines (handled via ?seed=windows).
async function newProposalFromWindows() {
  try {
    const { id: nid } = await SSCrm.fetchJSON("/api/proposals", { method: "POST", body: JSON.stringify({ project_id: id }) });
    location.href = `/crm/proposal.html?id=${nid}&seed=windows`;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}
async function newProposal() {
  try { const { id: nid } = await SSCrm.fetchJSON("/api/proposals", { method: "POST", body: JSON.stringify({ project_id: id }) }); location.href = "/crm/proposal.html?id=" + nid; }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
async function newContract() {
  // Ask which contract type
  const type = await pickContractType();
  if (!type) return;
  try {
    const { id: nid } = await SSCrm.fetchJSON("/api/contracts", { method: "POST", body: JSON.stringify({ project_id: id, contract_type: type }) });
    location.href = "/crm/contract.html?id=" + nid;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

function pickContractType() {
  return new Promise((resolve) => {
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    bg.innerHTML = `
      <div class="modal" style="max-width:520px">
        <div class="modal-head">What kind of contract?</div>
        <div class="modal-body" style="display:grid;gap:10px">
          <button class="btn secondary" data-t="custom_order" style="justify-content:flex-start;padding:14px;text-align:left;flex-direction:column;align-items:flex-start;gap:4px">
            <strong style="font-size:14px">Custom Order</strong>
            <span style="font-size:12px;color:var(--ink-soft);font-weight:400">We supply &amp; install custom-made treatments. 50% deposit. Manufacturer warranty + 90-day workmanship.</span>
          </button>
          <button class="btn secondary" data-t="install_only" style="justify-content:flex-start;padding:14px;text-align:left;flex-direction:column;align-items:flex-start;gap:4px">
            <strong style="font-size:14px">Install Only · BYO Blinds</strong>
            <span style="font-size:12px;color:var(--ink-soft);font-weight:400">Customer supplies blinds (Lowes, Home Depot, Costco, etc.). We install them. No deposit. Pay on completion. 90-day workmanship.</span>
          </button>
          <button class="btn secondary" data-t="repair" style="justify-content:flex-start;padding:14px;text-align:left;flex-direction:column;align-items:flex-start;gap:4px">
            <strong style="font-size:14px">Repair / Service Call</strong>
            <span style="font-size:12px;color:var(--ink-soft);font-weight:400">Repair an existing blind, shutter, or shade. Service-call fee + parts. Pay on completion. 90-day workmanship.</span>
          </button>
        </div>
        <div class="modal-foot"><button class="btn ghost" data-no>Cancel</button></div>
      </div>
    `;
    document.body.appendChild(bg);
    bg.querySelectorAll("[data-t]").forEach((b) => { b.onclick = () => { bg.remove(); resolve(b.dataset.t); }; });
    bg.querySelector("[data-no]").onclick = () => { bg.remove(); resolve(null); };
    bg.addEventListener("click", (e) => { if (e.target === bg) { bg.remove(); resolve(null); } });
  });
}
async function convertProposal(propId) {
  if (!(await SSCrm.confirmDialog("Create a contract from the accepted tier of this proposal?"))) return;
  try {
    const { id: nid } = await SSCrm.fetchJSON(`/api/proposals/${propId}/convert`, { method: "POST" });
    SSCrm.toast("Contract drafted from proposal", "success");
    location.href = "/crm/contract.html?id=" + nid;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}
</script>
</body>
</html>
