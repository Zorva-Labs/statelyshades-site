<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Availability · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="/crm/crm-app.css"/></head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
(async () => {
  const user = await SSCrm.mount({ title: "Availability", subtitle: "When customers can self-book a consultation",
    actions: `<a class="btn ghost" href="/crm/calendar.html">← Calendar</a>` });
  if (!user) return;
  const { rules, blocks } = await SSCrm.fetchJSON("/api/availability");
  document.getElementById("page").innerHTML = `
    <div class="card">
      <div class="card-head"><h2>Weekly hours</h2><span class="muted" style="font-size:12px">Times in 24h Central</span></div>
      <table class="lines"><thead><tr><th>Day</th><th>Start</th><th>End</th><th>Active</th><th></th></tr></thead>
      <tbody id="rules-body">${rules.length ? rules.map(ruleRow).join("") : ruleRow({ day_of_week: 1, start_minute: 540, end_minute: 1020, active: 1 })}</tbody></table>
      <div class="add"><button onclick="addRule()">+ Hours block</button></div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="card-head"><h2>Vacation / blocked times</h2></div>
      <table class="lines"><thead><tr><th>Start</th><th>End</th><th>Reason</th><th></th></tr></thead>
      <tbody id="blocks-body">${blocks.length ? blocks.map(blockRow).join("") : ""}</tbody></table>
      <div class="add"><button onclick="addBlock()">+ Blocked range</button></div>
    </div>
    <div class="form-actions" style="margin-top:16px"><button class="btn primary" onclick="save()">Save availability</button></div>
  `;
})();

function mtoH(m) { return String(Math.floor(m / 60)).padStart(2, "0") + ":" + String(m % 60).padStart(2, "0"); }
function hToM(h) { const [hh, mm] = (h || "00:00").split(":").map((n) => parseInt(n, 10)); return hh * 60 + mm; }

function ruleRow(r) {
  return `<tr>
    <td><select data-f="day_of_week">${DAYS.map((d, i) => `<option value="${i}" ${i === r.day_of_week ? "selected" : ""}>${d}</option>`).join("")}</select></td>
    <td><input type="time" data-f="start" value="${mtoH(r.start_minute)}"/></td>
    <td><input type="time" data-f="end" value="${mtoH(r.end_minute)}"/></td>
    <td><input type="checkbox" data-f="active" ${r.active !== 0 ? "checked" : ""}/></td>
    <td><button class="rm" onclick="this.closest('tr').remove()" title="Remove">×</button></td>
  </tr>`;
}
function blockRow(b) {
  return `<tr>
    <td><input type="datetime-local" data-f="start_at" value="${SSCrm.esc((b.start_at || "").replace(" ", "T").slice(0,16))}"/></td>
    <td><input type="datetime-local" data-f="end_at" value="${SSCrm.esc((b.end_at || "").replace(" ", "T").slice(0,16))}"/></td>
    <td><input data-f="reason" value="${SSCrm.esc(b.reason || "")}" placeholder="Vacation"/></td>
    <td><button class="rm" onclick="this.closest('tr').remove()" title="Remove">×</button></td>
  </tr>`;
}
function addRule() { document.getElementById("rules-body").insertAdjacentHTML("beforeend", ruleRow({ day_of_week: 1, start_minute: 540, end_minute: 1020, active: 1 })); }
function addBlock() { document.getElementById("blocks-body").insertAdjacentHTML("beforeend", blockRow({})); }

async function save() {
  const rules = [...document.querySelectorAll("#rules-body tr")].map((tr) => ({
    day_of_week: parseInt(tr.querySelector("[data-f=day_of_week]").value, 10),
    start_minute: hToM(tr.querySelector("[data-f=start]").value),
    end_minute: hToM(tr.querySelector("[data-f=end]").value),
    active: tr.querySelector("[data-f=active]").checked,
  }));
  const blocks = [...document.querySelectorAll("#blocks-body tr")].map((tr) => ({
    start_at: tr.querySelector("[data-f=start_at]").value.replace("T", " ") + ":00",
    end_at: tr.querySelector("[data-f=end_at]").value.replace("T", " ") + ":00",
    reason: tr.querySelector("[data-f=reason]").value.trim() || null,
  })).filter((b) => b.start_at.length > 5);
  try { await SSCrm.fetchJSON("/api/availability", { method: "PUT", body: JSON.stringify({ rules, blocks }) }); SSCrm.toast("Saved", "success"); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
</script></body></html>
