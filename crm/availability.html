<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Availability · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/crm/admin.css" /></head>
<body><div id="app"></div>
<script src="/crm/admin.js"></script><script>
const DOWS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
(async () => {
  const user = await SSAdmin.mount({ title: "Availability", subtitle: "Weekly hours + holiday blocks. Customers see only what fits these rules." });
  if (!user) return;
  await render();
})();

async function render() {
  const { rules, blocks } = await SSAdmin.fetchJSON("/api/availability");
  // Build a weekly editor: per day, list start–end ranges
  const byDay = Array.from({ length: 7 }, () => []);
  for (const r of rules) byDay[r.day_of_week].push(r);

  document.getElementById("page").innerHTML = `
    <div class="cols-2">
      <div class="panel">
        <h2>Weekly hours</h2>
        <p style="font-size:.88rem;color:var(--c-ink-soft)">When the booking page offers slots. 60-min slots are generated within each window.</p>
        <table class="lines-table">
          <thead><tr><th style="width:80px">Day</th><th>Start</th><th>End</th><th></th></tr></thead>
          <tbody id="rules">
            ${byDay.flatMap((day, dow) => day.map((r) => ruleRow(dow, r))).join("") || ruleRow(1, { start_minute: 540, end_minute: 1020 })}
          </tbody>
        </table>
        <div class="add-row" style="padding:8px 0"><button class="btn-ghost" onclick="addRule()">+ Window</button></div>
        <div class="form-actions"><button class="btn-primary" onclick="save()">Save</button></div>
      </div>

      <div class="panel">
        <h2>Time off / blocks</h2>
        <p style="font-size:.88rem;color:var(--c-ink-soft)">Vacations, holidays, one-off out-of-office.</p>
        <table class="lines-table">
          <thead><tr><th>Start</th><th>End</th><th>Reason</th><th></th></tr></thead>
          <tbody id="blocks">
            ${(blocks.length ? blocks : [{}]).map(blockRow).join("")}
          </tbody>
        </table>
        <div style="padding:8px 0"><button class="btn-ghost" onclick="addBlock()">+ Block</button></div>
        <div class="form-actions"><button class="btn-primary" onclick="save()">Save</button></div>
      </div>
    </div>
  `;
}

function timeOpts(selectedMin) {
  let html = "";
  for (let m = 0; m <= 1440; m += 30) {
    const h = Math.floor(m/60), mm = m % 60;
    html += `<option value="${m}" ${m===selectedMin?"selected":""}>${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}</option>`;
  }
  return html;
}
function ruleRow(dow, r) {
  return `<tr data-rule>
    <td><select data-f="day_of_week">${DOWS.map((d,i) => `<option value="${i}" ${i===dow?"selected":""}>${d}</option>`).join("")}</select></td>
    <td><select data-f="start_minute">${timeOpts(r.start_minute)}</select></td>
    <td><select data-f="end_minute">${timeOpts(r.end_minute)}</select></td>
    <td><button class="lt-remove" onclick="this.closest('tr').remove()">×</button></td>
  </tr>`;
}
function blockRow(b) {
  return `<tr data-block>
    <td><input data-f="start_at" type="datetime-local" value="${b.start_at ? b.start_at.slice(0,16) : ''}"/></td>
    <td><input data-f="end_at" type="datetime-local" value="${b.end_at ? b.end_at.slice(0,16) : ''}"/></td>
    <td><input data-f="reason" placeholder="Vacation, holiday…" value="${SSAdmin.esc(b.reason || '')}"/></td>
    <td><button class="lt-remove" onclick="this.closest('tr').remove()">×</button></td>
  </tr>`;
}
function addRule() { document.getElementById("rules").insertAdjacentHTML("beforeend", ruleRow(1, { start_minute: 540, end_minute: 1020 })); }
function addBlock() { document.getElementById("blocks").insertAdjacentHTML("beforeend", blockRow({})); }

async function save() {
  const rules = [...document.querySelectorAll("#rules [data-rule]")].map((tr) => ({
    day_of_week: parseInt(tr.querySelector("[data-f='day_of_week']").value, 10),
    start_minute: parseInt(tr.querySelector("[data-f='start_minute']").value, 10),
    end_minute: parseInt(tr.querySelector("[data-f='end_minute']").value, 10),
  }));
  const blocks = [...document.querySelectorAll("#blocks [data-block]")].map((tr) => ({
    start_at: tr.querySelector("[data-f='start_at']").value ? tr.querySelector("[data-f='start_at']").value + ":00" : null,
    end_at: tr.querySelector("[data-f='end_at']").value ? tr.querySelector("[data-f='end_at']").value + ":00" : null,
    reason: tr.querySelector("[data-f='reason']").value || null,
  })).filter((b) => b.start_at && b.end_at);
  try { await SSAdmin.fetchJSON("/api/availability", { method: "PUT", body: JSON.stringify({ rules, blocks }) }); SSAdmin.toast("Saved", "success"); }
  catch (e) { SSAdmin.toast(e.message, "error"); }
}
</script></body></html>
