<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contacts · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="/crm/crm-app.css"/></head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
(async () => {
  const action = new URLSearchParams(location.search).get("action");
  const user = await SSCrm.mount({
    title: "Contacts", subtitle: "Every person we've talked to",
    actions: `<input type="search" id="q" placeholder="Search…" style="padding:8px 12px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-size:13px;min-width:220px"/>
              <button class="btn primary" onclick="newContact()">+ New contact</button>`,
    wide: true,
  });
  if (!user) return;
  document.getElementById("q").oninput = debounce(load, 250);
  await load();
  if (action === "new") newContact();
})();
async function load() {
  const q = document.getElementById("q").value.trim();
  const { contacts } = await SSCrm.fetchJSON("/api/contacts" + (q ? "?q=" + encodeURIComponent(q) : ""));
  const page = document.getElementById("page");
  if (!contacts.length) { page.innerHTML = `<div class="tbl"><div class="empty">No contacts yet.</div></div>`; return; }
  page.innerHTML = `<div class="tbl"><table>
    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>Added</th></tr></thead>
    <tbody>${contacts.map((c) => `
      <tr class="clickable" onclick="location.href='/crm/contact.html?id=${c.id}'">
        <td><strong>${SSCrm.esc(c.name)}</strong></td>
        <td>${SSCrm.esc(c.email)}</td>
        <td class="muted">${SSCrm.esc(c.phone || "")}</td>
        <td class="muted">${SSCrm.esc(c.address_city || "")}</td>
        <td class="muted">${SSCrm.fmtDate(c.created_at)}</td>
      </tr>`).join("")}
    </tbody></table></div>`;
}
async function newContact() {
  const name = prompt("Full name?"); if (!name) return;
  const email = prompt("Email?"); if (!email) return;
  const phone = prompt("Phone (optional)?") || null;
  try { const { id } = await SSCrm.fetchJSON("/api/contacts", { method: "POST", body: JSON.stringify({ name, email, phone }) }); location.href = `/crm/contact.html?id=${id}`; }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
</script></body></html>
