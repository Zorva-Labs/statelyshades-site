<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calendar · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="/crm/crm-app.css"/></head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
(async () => {
  const user = await SSCrm.mount({ title: "Calendar", subtitle: "Upcoming consultations &amp; install visits",
    actions: `<a class="btn secondary" href="/crm/availability.html">Edit availability →</a>
              <button class="btn primary" onclick="newAppt()">+ Manual appointment</button>`, wide: true });
  if (!user) return;
  await load();
})();
async function load() {
  const today = new Date().toISOString().slice(0, 10);
  const to = new Date(Date.now() + 30 * 86400 * 1000).toISOString().slice(0, 10);
  const { appointments } = await SSCrm.fetchJSON(`/api/appointments?from=${today}&to=${to}`);
  // Group by date
  const groups = {};
  for (const a of appointments) {
    const d = (a.start_at || "").slice(0, 10);
    (groups[d] ||= []).push(a);
  }
  const dates = Object.keys(groups).sort();
  const page = document.getElementById("page");
  if (!dates.length) { page.innerHTML = `<div class="tbl"><div class="empty">No appointments scheduled in the next 30 days. <button class="btn primary sm" onclick="newAppt()" style="margin-left:8px">+ Add one</button></div></div>`; return; }
  page.innerHTML = dates.map((d) => `
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><h2>${prettyDate(d)}</h2><span class="muted" style="font-size:12px">${groups[d].length} appointment${groups[d].length === 1 ? "" : "s"}</span></div>
      <div class="tbl" style="border:0"><table><tbody>${groups[d].map((a) => `
        <tr class="clickable" onclick="editAppt(${a.id})">
          <td style="width:90px;color:var(--accent);font-weight:600">${SSCrm.fmtTime(a.start_at)}</td>
          <td><strong>${SSCrm.esc(a.name)}</strong><div class="muted" style="font-size:12px">${SSCrm.esc(a.type)} · ${a.duration_min || 60}m · ${SSCrm.esc(a.phone || "")}</div></td>
          <td class="muted">${SSCrm.esc(a.site_address || "")}<div style="font-size:12px">${SSCrm.esc(a.rooms || "")}</div></td>
          <td>${SSCrm.pill(a.status)}</td>
          <td><button class="btn ghost sm" onclick="event.stopPropagation();cancelAppt(${a.id})">Cancel</button></td>
        </tr>`).join("")}</tbody></table></div>
    </div>
  `).join("");
}
function prettyDate(d) {
  const date = new Date(d + "T12:00:00Z");
  return date.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
}
async function newAppt() {
  const name = prompt("Customer name?"); if (!name) return;
  const email = prompt("Email?"); if (!email) return;
  const phone = prompt("Phone?") || null;
  const dt = prompt("Start (YYYY-MM-DD HH:MM, 24h, Central time)\n\nExample: 2026-06-03 14:30"); if (!dt) return;
  const startAt = dt.replace(" ", "T") + ":00";
  const dur = parseInt(prompt("Duration in minutes?", "60") || "60", 10);
  const endAt = endIso(startAt, dur);
  try { const { id } = await SSCrm.fetchJSON("/api/appointments", { method: "POST", body: JSON.stringify({ name, email, phone, start_at: startAt, end_at: endAt, duration_min: dur, status: "confirmed", source: "admin" }) }); SSCrm.toast("Booked", "success"); load(); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
async function editAppt(id) {
  const action = prompt("Action? Type one:\n• 'confirm' to confirm\n• 'cancel' to cancel\n• 'complete' to mark completed", "complete");
  if (!action) return;
  const map = { confirm: "confirmed", cancel: "cancelled", complete: "completed" };
  if (!map[action]) return;
  try { await SSCrm.fetchJSON("/api/appointments/" + id, { method: "PATCH", body: JSON.stringify({ status: map[action] }) }); SSCrm.toast("Updated", "success"); load(); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
async function cancelAppt(id) {
  if (!(await SSCrm.confirmDialog("Cancel this appointment?"))) return;
  try { await SSCrm.fetchJSON("/api/appointments/" + id, { method: "DELETE" }); SSCrm.toast("Cancelled", "success"); load(); }
  catch (e) { SSCrm.toast(e.message, "error"); }
}
function endIso(startIso, durMin) {
  const [d, t] = startIso.split("T");
  const [h, m] = t.split(":").map((n) => parseInt(n, 10));
  let total = h * 60 + m + durMin;
  return `${d}T${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}:00`;
}
</script></body></html>
