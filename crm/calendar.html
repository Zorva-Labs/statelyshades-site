<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar · Stately Shades CRM</title><meta name="robots" content="noindex, nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/crm/admin.css" /></head>
<body><div id="app"></div>
<script src="/crm/admin.js"></script><script>
let weekStart = mondayOf(new Date());

(async () => {
  const user = await SSAdmin.mount({ title: "Calendar", subtitle: "Upcoming appointments — week view.",
    actions: `<button class="btn-secondary" onclick="prevWeek()">← Prev</button>
              <button class="btn-secondary" onclick="thisWeek()">This week</button>
              <button class="btn-secondary" onclick="nextWeek()">Next →</button>
              <a class="btn-secondary" href="/crm/availability.html">Availability</a>
              <button class="btn-primary" onclick="newAppt()">+ Appointment</button>` });
  if (!user) return;
  await render();
})();

function mondayOf(d) { const x = new Date(d); const dow = x.getDay(); const diff = (dow === 0 ? -6 : 1 - dow); x.setDate(x.getDate() + diff); x.setHours(0,0,0,0); return x; }
function fmtISO(d) { return d.toISOString().slice(0, 10); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function prevWeek() { weekStart = addDays(weekStart, -7); render(); }
function nextWeek() { weekStart = addDays(weekStart, 7); render(); }
function thisWeek() { weekStart = mondayOf(new Date()); render(); }

async function render() {
  const from = fmtISO(weekStart);
  const to = fmtISO(addDays(weekStart, 6));
  const { appointments } = await SSAdmin.fetchJSON(`/api/appointments?from=${from}&to=${to}`);

  const days = [...Array(7)].map((_, i) => addDays(weekStart, i));
  const HOURS_START = 8, HOURS_END = 19;
  const hours = [...Array(HOURS_END - HOURS_START)].map((_, i) => i + HOURS_START);

  document.getElementById("page-title").innerHTML = `Calendar · <em>${weekStart.toLocaleDateString(undefined, { month: 'long', day: 'numeric' })} – ${addDays(weekStart, 6).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })}</em>`;

  let html = `<div class="cal-wrap"><div class="cal-grid">`;
  html += `<div></div>`;
  for (const d of days) html += `<div class="cal-day-head">${d.toLocaleDateString(undefined, { weekday: 'short' })}<strong>${d.getDate()}</strong></div>`;
  for (const h of hours) {
    html += `<div class="cal-time">${h % 12 || 12}${h < 12 ? 'a' : 'p'}</div>`;
    for (const d of days) html += `<div class="cal-cell" data-d="${fmtISO(d)}" data-h="${h}"></div>`;
  }
  html += `</div></div>`;
  document.getElementById("page").innerHTML = html;

  // Layer events on top of cells
  for (const a of appointments) {
    if (a.status === "cancelled") continue;
    const d = a.start_at.slice(0, 10);
    const h = parseInt(a.start_at.slice(11, 13), 10);
    const m = parseInt(a.start_at.slice(14, 16), 10);
    const cell = document.querySelector(`.cal-cell[data-d='${d}'][data-h='${h}']`);
    if (!cell) continue;
    const dur = a.duration_min || 60;
    const ev = document.createElement("div");
    ev.className = "cal-event";
    ev.dataset.s = a.status;
    ev.style.top = (m / 60 * 100) + "%";
    ev.style.height = ((dur / 60) * 100) + "%";
    ev.title = `${a.start_at.slice(11, 16)} — ${a.name} (${a.type})`;
    ev.innerHTML = `<strong>${a.start_at.slice(11, 16)}</strong> ${SSAdmin.esc(a.name)}<br/>${SSAdmin.esc(a.type)}`;
    ev.onclick = () => openAppt(a.id);
    cell.appendChild(ev);
  }
}

async function openAppt(id) {
  const { appointment: a } = await SSAdmin.fetchJSON("/api/appointments/" + id);
  const txt = `Appointment #${id}\n${a.start_at} → ${a.end_at}\n${a.name} · ${a.email} · ${a.phone || ''}\n${a.site_address || ''}\n${a.rooms ? 'Rooms: ' + a.rooms : ''}\n${a.notes ? 'Notes: ' + a.notes : ''}\n\nStatus: ${a.status}`;
  if (confirm(txt + "\n\nMark as cancelled? OK = cancel, Cancel = leave")) {
    await SSAdmin.fetchJSON("/api/appointments/" + id, { method: "PATCH", body: JSON.stringify({ status: "cancelled" }) });
    render();
  }
}

async function newAppt() {
  const name = prompt("Customer name?"); if (!name) return;
  const email = prompt("Email?"); if (!email) return;
  const phone = prompt("Phone?") || null;
  const start = prompt("Start (YYYY-MM-DD HH:MM, 24h)?"); if (!start) return;
  const startIso = start.replace(" ", "T") + ":00";
  const endIso = computeEnd(startIso, 60);
  try {
    await SSAdmin.fetchJSON("/api/appointments", { method: "POST", body: JSON.stringify({
      name, email, phone, start_at: startIso, end_at: endIso, duration_min: 60, type: "consultation", source: "admin", status: "confirmed",
    })});
    SSAdmin.toast("Booked", "success"); render();
  } catch (e) { SSAdmin.toast(e.message, "error"); }
}
function computeEnd(s, mins) {
  const [d, t] = s.split("T"); const [h, m] = t.split(":").map((n) => parseInt(n, 10));
  let tot = h * 60 + m + mins; return `${d}T${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}:00`;
}
</script></body></html>
