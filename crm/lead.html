<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead · Stately Shades CRM</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/crm/crm-app.css" />
  <link rel="icon" href="/assets/images/logo-v4.png" />
</head>
<body>
<script src="/crm/crm-app.js"></script>
<script>
const LEAD_STATUSES = [
  { key: "new",        label: "New" },
  { key: "contacted",  label: "Contacted" },
  { key: "quoted",     label: "Quoted" },
  { key: "scheduled",  label: "Scheduled" },
  { key: "installed",  label: "Installed" },
  { key: "won",        label: "Won" },
  { key: "lost",       label: "Lost" },
  { key: "spam",       label: "Spam" },
];

const id = parseInt(new URLSearchParams(location.search).get("id"), 10);
if (!id) location.href = "/crm/leads.html";

let state = null; // { lead, notes }

(async () => {
  const user = await SSCrm.mount({
    title: "Lead",
    actions: `<a class="btn ghost" href="/crm/leads.html">← All leads</a>`,
  });
  if (!user) return;
  state = await SSCrm.fetchJSON("/api/leads/" + id);
  render();
})();

function render() {
  const l = state.lead;
  const notes = state.notes || [];
  document.getElementById("page-title").textContent = l.name;

  const addrParts = [l.address_street, [l.address_city, l.address_state].filter(Boolean).join(", "), l.address_zip].filter(Boolean);
  const addrLine = addrParts.length ? addrParts.join(" · ") : (l.location || "");
  const mapUrl = addrParts.length ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(addrParts.join(", ")) : null;

  document.getElementById("page").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:10px;align-items:center">
        ${SSCrm.pill(l.status)}
        <span class="muted" style="font-size:13px">Lead #${l.id} · ${SSCrm.fmtDate(l.created_at)}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" onclick="sendProposal()">+ Send proposal</button>
        ${l.contact_id ? `<a class="btn secondary" href="/crm/contact.html?id=${l.contact_id}">View contact →</a>` : `<button class="btn secondary" onclick="convertToContact()">Convert to contact + job</button>`}
        <button class="btn danger" onclick="del()">Delete</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start">
      <!-- LEFT: details + notes -->
      <div>
        <div class="card">
          <div class="card-head">
            <h2>Contact details</h2>
            <span class="muted" style="font-size:12px">Click any field to edit</span>
          </div>
          <div class="form">
            <label><span>Name</span><input id="f-name" value="${SSCrm.esc(l.name)}" required/></label>
            <div class="row">
              <label><span>Phone</span><input id="f-phone" type="tel" value="${SSCrm.esc(l.phone || "")}"/></label>
              <label><span>Email</span><input id="f-email" type="email" value="${SSCrm.esc(l.email || "")}"/></label>
            </div>
            <label><span>Street address</span><input id="f-street" value="${SSCrm.esc(l.address_street || "")}"/></label>
            <div class="row-3">
              <label><span>City</span><input id="f-city" value="${SSCrm.esc(l.address_city || "")}"/></label>
              <label><span>State</span><input id="f-state" value="${SSCrm.esc(l.address_state || "")}" maxlength="2"/></label>
              <label><span>ZIP</span><input id="f-zip" value="${SSCrm.esc(l.address_zip || "")}"/></label>
            </div>
            <label><span>Considering / interest</span><input id="f-interest" value="${SSCrm.esc(l.interest || "")}" placeholder="e.g. Plantation Shutters, Motorized Shades"/></label>
            <label><span>Their message</span><textarea id="f-message" rows="3">${SSCrm.esc(l.message || "")}</textarea></label>
            <label><span>Quoted amount ($, optional)</span><input id="f-quoted" type="text" value="${l.quoted_amount_cents ? SSCrm.fmtMoney(l.quoted_amount_cents) : ""}" placeholder="$0.00"/></label>
            <div class="form-actions">
              <button class="btn primary" onclick="saveDetails()">Save changes</button>
              ${mapUrl ? `<a class="btn ghost" href="${mapUrl}" target="_blank" rel="noopener">📍 Open address in Maps</a>` : ""}
            </div>
          </div>

          <hr class="sep"/>
          <div style="display:grid;grid-template-columns:140px 1fr;gap:8px 14px;font-size:13px;color:var(--ink-soft)">
            <div class="muted">Submitted</div><div>${SSCrm.fmtDateTime(l.created_at)}</div>
            <div class="muted">Source page</div><div>${SSCrm.esc(l.source_page || "web")}</div>
            ${l.utm_source ? `<div class="muted">UTM source</div><div>${SSCrm.esc(l.utm_source)}</div>` : ""}
            ${l.utm_campaign ? `<div class="muted">UTM campaign</div><div>${SSCrm.esc(l.utm_campaign)}</div>` : ""}
            ${l.utm_medium ? `<div class="muted">UTM medium</div><div>${SSCrm.esc(l.utm_medium)}</div>` : ""}
            ${l.referrer ? `<div class="muted">Referrer</div><div style="font-size:12px;word-break:break-all">${SSCrm.esc(l.referrer.slice(0, 100))}</div>` : ""}
          </div>
        </div>

        <div class="card" style="margin-top:14px">
          <div class="card-head"><h2>Notes</h2><span class="muted" style="font-size:12px">${notes.length}</span></div>
          <div id="notes-list">${renderNotes(notes)}</div>
          <hr class="sep"/>
          <form id="note-form" onsubmit="addNote(event)" style="display:grid;gap:8px">
            <textarea name="body" placeholder="Add a note — call summary, follow-up needed, anything to remember…" rows="3" required style="width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font:inherit;font-size:13px;resize:vertical"></textarea>
            <div><button type="submit" class="btn primary sm">+ Add note</button></div>
          </form>
        </div>
      </div>

      <!-- RIGHT: status, quick actions -->
      <div>
        <div class="card">
          <div class="card-head"><h2>Pipeline status</h2></div>
          <div class="form">
            <label><span>Status</span>
              <select id="status-select" onchange="updateStatus(this.value)">
                ${LEAD_STATUSES.map((s) => `<option value="${s.key}" ${s.key === l.status ? "selected" : ""}>${s.label}</option>`).join("")}
              </select>
            </label>
            ${l.quoted_amount_cents ? `<p class="muted" style="font-size:13px;margin:0">Quoted: <strong class="money">${SSCrm.fmtMoney(l.quoted_amount_cents)}</strong></p>` : ""}
          </div>
        </div>

        <div class="card" style="margin-top:14px">
          <div class="card-head"><h2>Quick actions</h2></div>
          <div style="display:grid;gap:8px">
            <button class="btn primary" onclick="sendProposal()">📄 Send a proposal</button>
            ${l.phone ? `<a class="btn secondary" href="tel:${SSCrm.esc(l.phone)}">📞 Call ${SSCrm.esc(l.phone)}</a>` : ""}
            ${l.phone ? `<a class="btn secondary" href="sms:${SSCrm.esc(l.phone)}">💬 Text</a>` : ""}
            ${l.email ? `<a class="btn secondary" href="mailto:${SSCrm.esc(l.email)}">✉️ Email</a>` : ""}
            <button class="btn secondary" onclick="bookFromLead()">📅 Book consultation</button>
            ${!l.contact_id ? `<button class="btn ghost" onclick="convertToContact()">Convert to contact (no proposal yet)</button>` : ""}
          </div>
        </div>

        ${l.contact_id ? `
          <div class="card" style="margin-top:14px">
            <div class="card-head"><h2>Linked contact</h2></div>
            <a class="btn secondary" href="/crm/contact.html?id=${l.contact_id}" style="width:100%;justify-content:center">Open contact →</a>
          </div>
        ` : ""}
      </div>
    </div>
  `;
}

function renderNotes(arr) {
  if (!arr || !arr.length) return `<p class="muted" style="text-align:center;padding:20px 0;font-style:italic">No notes yet.</p>`;
  return `<ul class="activity">${arr.map((n) => `
    <li>
      <span class="activity__icon">📝</span>
      <div class="activity__body">
        ${SSCrm.esc(n.body)}
        <div class="activity__time">${SSCrm.esc(n.author || "—")} · ${SSCrm.fmtDateTime(n.created_at)}</div>
      </div>
    </li>`).join("")}</ul>`;
}

async function sendProposal() {
  const l = state.lead;
  if (!l.email) { SSCrm.toast("Add an email to this lead first", "error"); return; }

  // Smart default project name based on the lead's stated interest
  const defaultName = l.interest ? `${l.interest} — ${l.name}` : `Whole house — ${l.name}`;

  // Quick modal for the project name (+ optional notes)
  const projectName = await new Promise((resolve) => {
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    bg.innerHTML = `
      <div class="modal" style="max-width:480px">
        <div class="modal-head">Send a proposal to ${SSCrm.esc(l.name)}</div>
        <div class="modal-body">
          <div class="form">
            <label>
              <span>Project name (used internally)</span>
              <input id="sp-name" value="${SSCrm.esc(defaultName)}" required autofocus/>
            </label>
            <p class="muted" style="font-size:12px;margin:0">
              We'll create a contact, a job, and a fresh proposal draft for ${SSCrm.esc(l.name)} in one click.
              You'll then build the three tiers and click Send to email them the proposal link.
            </p>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" data-cancel>Cancel</button>
          <button class="btn primary" data-go>Create proposal draft →</button>
        </div>
      </div>
    `;
    document.body.appendChild(bg);
    bg.querySelector("[data-cancel]").onclick = () => { bg.remove(); resolve(null); };
    bg.querySelector("[data-go]").onclick = () => {
      const v = bg.querySelector("#sp-name").value.trim();
      bg.remove();
      resolve(v || defaultName);
    };
    bg.addEventListener("click", (e) => { if (e.target === bg) { bg.remove(); resolve(null); } });
    bg.querySelector("#sp-name").addEventListener("keydown", (e) => { if (e.key === "Enter") bg.querySelector("[data-go]").click(); });
  });

  if (!projectName) return;

  try {
    const res = await SSCrm.fetchJSON(`/api/leads/${id}/send-proposal`, {
      method: "POST",
      body: JSON.stringify({ project_name: projectName }),
    });
    SSCrm.toast("Proposal draft created — building it now…", "success");
    setTimeout(() => { location.href = `/crm/proposal.html?id=${res.proposal_id}`; }, 500);
  } catch (e) {
    SSCrm.toast(e.message, "error");
  }
}

async function saveDetails() {
  const v = (id) => document.getElementById(id).value.trim();
  const body = {
    name:           v("f-name"),
    phone:          v("f-phone") || null,
    email:          v("f-email") || null,
    address_street: v("f-street") || null,
    address_city:   v("f-city") || null,
    address_state:  v("f-state") || null,
    address_zip:    v("f-zip") || null,
    interest:       v("f-interest") || null,
    message:        v("f-message") || null,
  };
  // Parse quoted amount (accept "$1,234.56" or "1234.56" or empty)
  const quotedRaw = v("f-quoted");
  if (quotedRaw) {
    body.quoted_amount_cents = SSCrm.parseMoney(quotedRaw);
  } else {
    body.quoted_amount_cents = null;
  }
  if (!body.name) { SSCrm.toast("Name is required", "error"); return; }
  try {
    const { lead } = await SSCrm.fetchJSON("/api/leads/" + id, { method: "PATCH", body: JSON.stringify(body) });
    state.lead = lead;
    SSCrm.toast("Lead saved", "success");
    render();
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function updateStatus(status) {
  try {
    await SSCrm.fetchJSON("/api/leads/" + id, { method: "PATCH", body: JSON.stringify({ status }) });
    SSCrm.toast("Status updated", "success");
    state.lead.status = status;
    render();
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function addNote(e) {
  e.preventDefault();
  const form = e.target;
  const body = form.body.value.trim();
  if (!body) return;
  const btn = form.querySelector("button");
  btn.disabled = true;
  try {
    const { notes } = await SSCrm.fetchJSON("/api/leads/" + id + "/notes", { method: "POST", body: JSON.stringify({ body }) });
    state.notes = notes;
    render();
    SSCrm.toast("Note added", "success");
  } catch (err) {
    SSCrm.toast(err.message, "error");
  } finally {
    btn.disabled = false;
  }
}

async function del() {
  if (!(await SSCrm.confirmDialog(`Delete lead "${state.lead.name}"? This cannot be undone.`))) return;
  await SSCrm.fetchJSON("/api/leads/" + id, { method: "DELETE" });
  SSCrm.toast("Lead deleted", "success");
  setTimeout(() => location.href = "/crm/leads.html", 400);
}

async function convertToContact() {
  const l = state.lead;
  if (!(await SSCrm.confirmDialog(`Create a contact + job for ${l.name}?\n\nThis lets you start an estimate, proposal, or contract.`))) return;
  try {
    // 1) Upsert contact
    const { id: contactId } = await SSCrm.fetchJSON("/api/contacts", {
      method: "POST",
      body: JSON.stringify({
        name: l.name, email: l.email, phone: l.phone,
        address: {
          street: l.address_street, city: l.address_city,
          state: l.address_state, zip: l.address_zip,
        },
      }),
    });
    // 2) Create a default job
    const jobName = l.interest ? `${l.interest} — ${l.name}` : `Whole house — ${l.name}`;
    const { id: projectId } = await SSCrm.fetchJSON("/api/projects", {
      method: "POST",
      body: JSON.stringify({ contact_id: contactId, name: jobName, description: l.message || null }),
    });
    // 3) Link lead → contact (PATCH won't accept contact_id via current API; just track via status)
    await SSCrm.fetchJSON("/api/leads/" + id, { method: "PATCH", body: JSON.stringify({ status: "contacted" }) });
    SSCrm.toast("Contact + job created", "success");
    location.href = "/crm/project.html?id=" + projectId;
  } catch (e) { SSCrm.toast(e.message, "error"); }
}

async function bookFromLead() {
  // Pre-fill the quick-add appointment modal with this lead's contact info
  const l = state.lead;
  // Use the existing helper but pre-populate
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
  bg.innerHTML = `
    <div class="modal" style="max-width:520px">
      <div class="modal-head">Book consultation for ${SSCrm.esc(l.name)}</div>
      <div class="modal-body">
        <div class="form">
          <div class="row">
            <label><span>Date</span><input id="bk-date" type="date" value="${tomorrow}" required/></label>
            <label><span>Start time</span><input id="bk-time" type="time" value="10:00" required/></label>
          </div>
          <div class="row">
            <label><span>Duration (min)</span><input id="bk-dur" type="number" value="60" min="15" step="15"/></label>
            <label><span>Type</span>
              <select id="bk-type"><option value="consultation">Consultation</option><option value="measure">Measure</option></select>
            </label>
          </div>
          <label><span>Notes (optional)</span><textarea id="bk-notes" rows="2"></textarea></label>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" data-cancel>Cancel</button>
        <button class="btn primary" data-save>Book it</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.querySelector("[data-cancel]").onclick = () => bg.remove();
  bg.addEventListener("click", (e) => { if (e.target === bg) bg.remove(); });
  bg.querySelector("[data-save]").onclick = async () => {
    const date = bg.querySelector("#bk-date").value;
    const time = bg.querySelector("#bk-time").value;
    const dur = parseInt(bg.querySelector("#bk-dur").value || "60", 10);
    const [h, m] = time.split(":").map((n) => parseInt(n, 10));
    const totalMin = h * 60 + m + dur;
    const endTime = `${String(Math.floor(totalMin / 60)).padStart(2, "0")}:${String(totalMin % 60).padStart(2, "0")}`;
    const addrParts = [l.address_street, [l.address_city, l.address_state].filter(Boolean).join(", "), l.address_zip].filter(Boolean);
    try {
      await SSCrm.fetchJSON("/api/appointments", { method: "POST", body: JSON.stringify({
        name: l.name, email: l.email, phone: l.phone,
        start_at: `${date}T${time}:00`,
        end_at: `${date}T${endTime}:00`,
        duration_min: dur,
        type: bg.querySelector("#bk-type").value,
        site_address: addrParts.join(", ") || null,
        notes: bg.querySelector("#bk-notes").value.trim() || null,
        status: "confirmed",
        source: "admin",
      })});
      // Bump lead status to scheduled
      await SSCrm.fetchJSON("/api/leads/" + id, { method: "PATCH", body: JSON.stringify({ status: "scheduled" }) });
      bg.remove();
      SSCrm.toast("Consultation booked", "success");
      // Refresh
      state = await SSCrm.fetchJSON("/api/leads/" + id);
      render();
    } catch (e) { SSCrm.toast(e.message, "error"); }
  };
}
</script>
</body>
</html>
